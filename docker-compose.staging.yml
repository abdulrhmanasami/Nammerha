# ═══════════════════════════════════════════════════════════════════════════════
# Nammerha Platform — Docker Compose (Staging)
# Report §6: 100% mirror of production for pre-release QA validation
# ═══════════════════════════════════════════════════════════════════════════════
# Usage: docker compose -f docker-compose.staging.yml up -d
# Requires: .env.staging file with staging-specific secrets
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ── Database: Isolated staging DB ──────────────────────────────────────
  nammerha-staging-db:
    image: postgis/postgis:16-3.4-alpine
    container_name: nammerha-staging-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nammerha_staging
      POSTGRES_USER: nammerha
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:?STAGING_POSTGRES_PASSWORD must be set}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=en_US.utf8'
    volumes:
      - nammerha-staging-pgdata:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5435:5432'
    networks:
      - nammerha-staging-net
    labels:
      - 'com.nammerha.project=nammerha'
      - 'com.nammerha.env=staging'
      - 'com.nammerha.component=database'
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nammerha -d nammerha_staging']
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ── Object Storage: Staging MinIO ──────────────────────────────────────
  nammerha-staging-minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: nammerha-staging-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${STAGING_MINIO_USER:-staging-admin}
      MINIO_ROOT_PASSWORD: ${STAGING_MINIO_PASSWORD:-staging-secret-change-me}
      MINIO_BROWSER_REDIRECT_URL: ''
    volumes:
      - nammerha-staging-minio-data:/data
    ports:
      - '127.0.0.1:9020:9000'
      - '127.0.0.1:9021:9001'
    networks:
      - nammerha-staging-net
    labels:
      - 'com.nammerha.project=nammerha'
      - 'com.nammerha.env=staging'
      - 'com.nammerha.component=storage'
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.15'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ── Frontend: Staging build ──────────────────────────────────────────
  nammerha-staging-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nammerha-staging-frontend
    restart: unless-stopped
    ports:
      - '127.0.0.1:8083:8080'
    networks:
      - nammerha-staging-net
    labels:
      - 'com.nammerha.project=nammerha'
      - 'com.nammerha.env=staging'
      - 'com.nammerha.component=frontend'
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=1001,gid=1001
      - /var/log/nginx:uid=1001,gid=1001
      - /var/run:uid=1001,gid=1001
      - /tmp:uid=1001,gid=1001
    security_opt:
      - no-new-privileges:true

  # ── Backend: Staging API ──────────────────────────────────────────────
  nammerha-staging-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nammerha-staging-backend
    restart: unless-stopped
    ports:
      - '127.0.0.1:3011:3001'
    networks:
      - nammerha-staging-net
    environment:
      - NODE_ENV=staging
      - PORT=3001
      - DATABASE_URL=postgresql://nammerha:${STAGING_POSTGRES_PASSWORD:?}@nammerha-staging-db:5432/nammerha_staging
      - JWT_SECRET=${STAGING_JWT_SECRET:?STAGING_JWT_SECRET must be set}
      - JWT_EXPIRY=${JWT_EXPIRY:-24h}
      - PLATFORM_BASE_URL=https://staging.nammerha.com
      # Sandbox payment gateways
      - VISA_API_BASE_URL=https://sandbox.api.visa.com
      - FATORA_API_BASE_URL=https://staging.api.fatora.io
      - PAYMENT_WEBHOOK_SECRET=${STAGING_WEBHOOK_SECRET:-staging-webhook-secret}
      - GPS_PROXIMITY_THRESHOLD_METERS=500
      # Auth0 staging tenant
      - AUTH0_DOMAIN=${STAGING_AUTH0_DOMAIN:-}
      - AUTH0_AUDIENCE=${STAGING_AUTH0_AUDIENCE:-}
      - CORS_ORIGINS=https://staging.nammerha.com,http://localhost:3000
      # Staging storage
      - STORAGE_PROVIDER=minio
      - STORAGE_BUCKET=nammerha-staging-uploads
      - STORAGE_REGION=us-east-1
      - STORAGE_ENDPOINT=http://nammerha-staging-minio:9000
      - STORAGE_ACCESS_KEY=${STAGING_MINIO_USER:-staging-admin}
      - STORAGE_SECRET_KEY=${STAGING_MINIO_PASSWORD:-staging-secret-change-me}
      - STORAGE_MAX_SIZE_MB=50
    labels:
      - 'com.nammerha.project=nammerha'
      - 'com.nammerha.env=staging'
      - 'com.nammerha.component=backend'
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'
    security_opt:
      - no-new-privileges:true
    depends_on:
      nammerha-staging-db:
        condition: service_healthy
      nammerha-staging-minio:
        condition: service_healthy
    volumes:
      - ./stitch:/app/stitch:ro

volumes:
  nammerha-staging-pgdata:
    name: nammerha-staging-pgdata
  nammerha-staging-minio-data:
    name: nammerha-staging-minio-data

networks:
  nammerha-staging-net:
    driver: bridge
    name: nammerha-staging-net
