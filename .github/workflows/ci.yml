# ============================================================================
# Nammerha — CI Pipeline (Lint → Typecheck → Test → Build)
# Runs on every push and PR to main branch
# ============================================================================

name: CI Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ── Backend CI ─────────────────────────────────────────────────────────────
    backend:
        name: Backend (Lint → Type → Test → Build)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"
                  cache-dependency-path: backend/package-lock.json

            - name: Install Dependencies
              run: npm ci

            - name: Lint
              run: npx eslint src/ --max-warnings 0 --no-error-on-unmatched-pattern
              continue-on-error: true # Report but don't block — fix progressively

            - name: TypeScript Typecheck
              run: npx tsc --noEmit

            - name: Unit & Integration Tests
              run: npx vitest run --reporter=verbose

            - name: Build
              run: npx tsc --project tsconfig.json

    # ── Frontend CI ────────────────────────────────────────────────────────────
    frontend:
        name: Frontend (Lint → Type → Build → Test)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install Dependencies
              run: npm ci --ignore-scripts

            - name: Lint
              run: npx eslint src/ --max-warnings 0 --no-error-on-unmatched-pattern
              continue-on-error: true

            - name: TypeScript Typecheck
              run: npx tsc --noEmit

            - name: Production Build
              run: npx vite build

            - name: Unit Tests
              run: npx vitest run --reporter=verbose

    # ── Security Audit ─────────────────────────────────────────────────────────
    security:
        name: Dependency Security Audit
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"
                  cache-dependency-path: backend/package-lock.json

            - name: Install Dependencies
              run: npm ci

            - name: npm Audit (Production)
              run: npm audit --production --audit-level=high
              continue-on-error: true # Report but don't block

    # ── Deploy to Production ───────────────────────────────────────────────────
    deploy:
        name: Deploy to Production
        runs-on: ubuntu-latest
        needs: [backend, frontend]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        environment:
            name: production
            url: https://nammerha.com
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  script: |
                      cd /opt/nammerha-backend
                      git pull origin main
                      docker compose -f docker-compose.prod.yml build --no-cache
                      docker compose -f docker-compose.prod.yml up -d
                      echo "✅ Nammerha deployed at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
