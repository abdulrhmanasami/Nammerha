# ═══════════════════════════════════════════════════════════════════════════════
# Nammerha Platform — SonarQube/SonarCloud Configuration
# FinTech-Grade Quality Gate (Zero Tolerance for Security Vulnerabilities)
# ═══════════════════════════════════════════════════════════════════════════════

sonar.projectKey=nammerha-platform
sonar.projectName=Nammerha — OCDS Reconstruction Platform
sonar.projectVersion=1.0.0

# ─── Source Directories ──────────────────────────────────────────────────────
sonar.sources=backend/src,frontend/src
sonar.tests=backend/src/**/*.test.ts,frontend/src/**/*.test.ts

# ─── Language Configuration ──────────────────────────────────────────────────
sonar.language=ts
sonar.typescript.tsconfigPath=backend/tsconfig.json,frontend/tsconfig.json

# ─── Exclusions ──────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.min.*,\
  **/coverage/**,\
  **/*.test.ts,\
  **/*.spec.ts,\
  **/reports/**

# ─── Coverage (future — when tests are added) ───────────────────────────────
# sonar.typescript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# ─── FinTech Quality Gate Thresholds ─────────────────────────────────────────
# These are enforced on the SonarCloud dashboard as a Quality Gate:
#   - 0 Bugs
#   - 0 Vulnerabilities
#   - 0 Security Hotspots (must all be reviewed)
#   - Code Smells: Maintainability Rating A
#   - Duplicated Lines < 3%
#   - Coverage on new code >= 80% (enforced when test suite exists)

# ─── Encoding ────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
