# ── Nammerha — Self-Hosted SMTP Relay (Postfix)
# Zero external dependencies — runs entirely on your own server
# Container joins nammerha-net so the backend can reach it at smtp:587
#
# Usage:
#   docker compose -f docker-compose.smtp.yml up -d
#
# DNS Records Required (add to your domain's DNS):
#   TXT  @         "v=spf1 ip4:91.98.182.243 -all"
#   TXT  _dmarc    "v=DMARC1; p=quarantine; rua=mailto:admin@nammerha.com"
#
# DKIM key will be auto-generated on first start.
# Run: docker exec nammerha-smtp cat /etc/opendkim/keys/nammerha.com/default.txt
# Then add that TXT record to DNS as: default._domainkey.nammerha.com

services:
  smtp:
    image: boky/postfix:latest
    container_name: nammerha-smtp
    restart: unless-stopped
    hostname: mail.nammerha.com
    environment:
      # Domain configuration
      - ALLOWED_SENDER_DOMAINS=nammerha.com
      - HOSTNAME=mail.nammerha.com
      # Security: only allow connections from nammerha-net
      - RELAYHOST=
      - MESSAGE_SIZE_LIMIT=10485760
      # Force IPv4 — production server has no IPv6 connectivity
      - POSTFIX_inet_protocols=ipv4
      # DKIM signing (auto-generated)
      - DKIM_AUTOGENERATE=true
      - DKIM_SELECTOR=default
    volumes:
      # Persist DKIM keys across container restarts
      - smtp-dkim-keys:/etc/opendkim/keys
    networks:
      - nammerha-net
    labels:
      - 'com.nammerha.project=nammerha'
      - 'com.nammerha.component=smtp'
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'
    # Expose port only on internal network, not to the public
    expose:
      - '587'
    security_opt:
      - no-new-privileges:true

volumes:
  smtp-dkim-keys:
    driver: local

networks:
  nammerha-net:
    external: true
    name: nammerha-net
