    """Immutable escrow ledger entry (مجمدة)"""
    type EscrowEntry {
        transactionId: ID!
        donorId: ID!
        itemId: ID!
        projectId: ID!
        amountLocked: BigIntCents!
        currency: String!
        paymentStatus: PaymentStatus!
        paymentMethod: PaymentMethod
        paymentGatewayRef: String
        lockedAt: DateTime
        releasedAt: DateTime
        releasedBy: ID
        releaseProofId: ID
        refundedAt: DateTime
        blockchainTxHash: String
        createdAt: DateTime!
        updatedAt: DateTime!
    }
