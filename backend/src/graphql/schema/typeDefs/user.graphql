    """Platform user — all roles: donor, homeowner, engineer, supplier, admin, etc."""
    type User {
        userId: ID!
        email: String!
        phone: String
        fullName: String!
        role: UserRole!
        avatarUrl: String
        kycVerificationStatus: KycStatus!
        isActive: Boolean!
        isEmailVerified: Boolean!
        roles: [UserRole!]!
        createdAt: DateTime!
        updatedAt: DateTime!
    }

    """Authenticated user context injected from JWT"""
    type AuthUser {
        userId: ID!
        role: UserRole!
        roles: [UserRole!]!
        isActive: Boolean!
    }

    type AuthPayload {
        token: String!
        refreshToken: String
        user: User!
    }
