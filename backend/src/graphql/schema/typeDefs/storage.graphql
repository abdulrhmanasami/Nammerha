    """Pre-signed upload URL response"""
    type UploadUrl {
        uploadUrl: String!
        publicUrl: String!
        storageKey: String!
        expiresAt: DateTime!
    }

    """Payment intent response for gateway redirect"""
    type PaymentIntent {
        intentId: String!
        checkoutUrl: String!
        clientSecret: String
        returnUrl: String!
        amount: BigIntCents!
        currency: String!
    }

    """Paginated projects response"""
    type PaginatedProjects {
        items: [ProjectCard!]!
        total: Int!
        page: Int!
        pageSize: Int!
        hasMore: Boolean!
    }

    """Paginated notifications response"""
    type PaginatedNotifications {
        items: [Notification!]!
        total: Int!
        unreadCount: Int!
    }
