<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nammerha - Service Request</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1A73E8",
                        "background-light": "#F4F6F8",
                        "background-dark": "#181121",
                        "surface": "#FFFFFF",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(26, 115, 232, 0.05);
        }
        .active-card {
            border-color: #1A73E8;
            background: rgba(26, 115, 232, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  <link href="../i18n/i18n.css" rel="stylesheet"/>
<script src="../i18n/i18n.js" defer></script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-full min-h-screen w-full flex-col max-w-md mx-auto overflow-x-hidden">
<header class="p-6 pb-2">
<div class="flex items-center justify-between mb-6">
<button aria-label="Go back" class="flex size-12 shrink-0 items-center justify-center rounded-full bg-surface shadow-sm border border-slate-200 dark:border-slate-800">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex-1 flex flex-col items-center">
<span class="text-xs font-bold uppercase tracking-widest text-primary/70">Step 1 of 3</span>
<div class="w-32 h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full mt-2 overflow-hidden">
<div class="h-full bg-primary w-1/3 rounded-full"></div>
</div>
</div>
<div class="size-12"></div>
</div>
</header>
<main class="flex-1 px-6 flex flex-col">
<h1 class="text-[32px] font-bold leading-tight text-slate-900 dark:text-slate-50 mt-4 mb-8 text-center">
                What kind of damage needs repair?
            </h1>
<div class="space-y-4 mb-10">
<!-- Structural Card -->
<button class="glass-card active-card w-full p-5 rounded-xl flex items-center gap-5 text-left transition-all active:scale-95">
<div class="size-16 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined !text-4xl">home_work</span>
</div>
<div>
<h3 class="text-xl font-bold text-slate-900 leading-tight">Structural Damage</h3>
<p class="text-slate-600 text-sm mt-1">Foundations, walls, and roofing</p>
</div>
<div class="ml-auto text-primary">
<span class="material-symbols-outlined">check_circle</span>
</div>
</button>
<!-- Plumbing Card -->
<button class="glass-card w-full p-5 rounded-xl flex items-center gap-5 text-left transition-all active:scale-95">
<div class="size-16 rounded-lg bg-slate-100 flex items-center justify-center text-slate-700">
<span class="material-symbols-outlined !text-4xl">plumbing</span>
</div>
<div>
<h3 class="text-xl font-bold text-slate-900 leading-tight">Plumbing</h3>
<p class="text-slate-600 text-sm mt-1">Pipes, leaks, and water systems</p>
</div>
<div class="ml-auto text-slate-300">
<span class="material-symbols-outlined">radio_button_unchecked</span>
</div>
</button>
<!-- Electrical Card -->
<button class="glass-card w-full p-5 rounded-xl flex items-center gap-5 text-left transition-all active:scale-95">
<div class="size-16 rounded-lg bg-slate-100 flex items-center justify-center text-slate-700">
<span class="material-symbols-outlined !text-4xl">electrical_services</span>
</div>
<div>
<h3 class="text-xl font-bold text-slate-900 leading-tight">Electrical</h3>
<p class="text-slate-600 text-sm mt-1">Wiring, outlets, and panel repair</p>
</div>
<div class="ml-auto text-slate-300">
<span class="material-symbols-outlined">radio_button_unchecked</span>
</div>
</button>
</div>
</main>
<footer class="p-6 pt-2 space-y-4">
<button class="w-full bg-primary/10 text-primary py-4 px-6 rounded-xl flex items-center justify-center gap-3 font-semibold transition-all hover:bg-primary/20">
<span class="material-symbols-outlined">mic</span>
<span>Or tap to describe with your voice</span>
</button>
<button class="w-full bg-primary text-white py-5 px-6 rounded-xl text-lg font-bold shadow-lg shadow-primary/20 transition-all hover:bg-primary/90 active:scale-[0.98]">
                Next Step
            </button>
<div class="flex justify-center pb-2">
<div class="w-32 h-1 bg-slate-300 rounded-full opacity-50"></div>
</div>
</footer>
</div>
</body></html>
