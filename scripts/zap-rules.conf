# ═══════════════════════════════════════════════════════════════════════════════
# OWASP ZAP — Custom Scan Rules Configuration
# Nammerha FinTech Platform
# ═══════════════════════════════════════════════════════════════════════════════
# Format: <rule_id>  <action>  <description>
# Actions: IGNORE, INFO, WARN, FAIL
#
# Rule Reference: https://www.zaproxy.org/docs/alerts/
# ═══════════════════════════════════════════════════════════════════════════════

# ─── CRITICAL: Always FAIL ──────────────────────────────────────────────────
40018	FAIL	# SQL Injection
40012	FAIL	# Cross Site Scripting (Reflected)
40014	FAIL	# Cross Site Scripting (Persistent)
40032	FAIL	# .htaccess Information Leak
10010	FAIL	# Cookie No HttpOnly Flag
10011	FAIL	# Cookie Without Secure Flag
10054	FAIL	# Cookie without SameSite Attribute
90021	FAIL	# XPath Injection
90023	FAIL	# XML External Entity Attack
10020	FAIL	# Missing Anti-Clickjacking Header
10021	FAIL	# X-Content-Type-Options Missing
40013	FAIL	# Session ID in URL Rewrite
10035	FAIL	# Strict-Transport-Security Header Not Set

# ─── HIGH: FAIL for FinTech (escrow/payment critical) ───────────────────────
10202	FAIL	# Absence of Anti-CSRF Tokens (critical for escrow release)
40003	FAIL	# CRLF Injection
30001	FAIL	# Buffer Overflow
30002	FAIL	# Format String Error
40009	FAIL	# Server Side Include
40008	FAIL	# Parameter Tampering (critical for donation amounts)

# ─── MEDIUM: WARN (review encouraged) ───────────────────────────────────────
10015	WARN	# Incomplete or No Cache-control and Pragma HTTP Header Set
10017	WARN	# Cross-Domain JavaScript Source File Inclusion
10098	WARN	# Cross-Domain Misconfiguration
40025	WARN	# Proxy Disclosure
90033	WARN	# Loosely Scoped Cookie

# ─── INFORMATIONAL: Log but don't block ─────────────────────────────────────
10036	INFO	# Server Leaks Version Information
10037	INFO	# Server Leaks Information via X-Powered-By
10109	INFO	# Modern Web Application
10049	INFO	# Non-Storable Content

# ─── Known False Positives (webhook endpoints) ──────────────────────────────
# Payment webhooks use HMAC-SHA256 signature verification instead of
# standard CSRF tokens. ZAP may flag these incorrectly.
# 10202 on /api/payments/webhook is expected — documented in RBAC matrix.
