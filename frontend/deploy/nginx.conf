# ── Nammerha Frontend — Nginx Configuration
# Optimized for static SPA/MPA serving with security headers

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security Headers (Report §5) ───────────────────────────────────
    # HSTS: 2 years + includeSubDomains + preload (matches backend Helmet config)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://*.nammerha.com https://*.openfreemap.org; connect-src 'self' https://*.nammerha.com https://*.auth0.com http://nammerha.com https://tiles.openfreemap.org https://*.openfreemap.org; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    # ─── Compression ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ─── Static Asset Caching (hashed filenames from Vite) ─────────────
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Health Check Endpoint ─────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ─── MPA Routing — Serve HTML files directly ───────────────────────
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ─── Error Pages ───────────────────────────────────────────────────
    error_page 404 /index.html;

    # ─── Deny hidden files ─────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
