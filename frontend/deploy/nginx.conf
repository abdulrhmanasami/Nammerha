# ── Nammerha Frontend — Nginx Configuration
# Optimized for static SPA/MPA serving with security headers
# P1-NGX-001 FIX: Security headers are centralized in security-headers.conf
# and included in every location block that uses add_header.

server {
    # GAP-P1 PLATINUM FIX: HTTP/2 enabled — multiplexes requests, reduces latency
    # on degraded Syrian networks (2G/3G), and enables header compression (HPACK).
    listen 8080 http2;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security Headers (centralized — P1-NGX-001) ──────────────────
    # Loaded via include so that child location blocks inherit them.
    # See security-headers.conf for the full header set and CSP policy.
    include /etc/nginx/conf.d/security-headers.conf;

    # ─── Compression (P-04: Brotli + gzip) ───────────────────────────
    # Brotli: ~20-30% smaller than gzip for text assets.
    # Supported by all modern browsers (Chrome 50+, Firefox 44+, Safari 11+).
    # Falls back to gzip for older clients.
    #
    # GAP-P1 PLATINUM FIX: Added Brotli static pre-compressed file serving.
    # If a .br file exists alongside the original (e.g., main.css.br), Nginx
    # serves it directly without real-time compression — zero CPU overhead.
    # Brotli static files can be pre-generated during build: `brotli -Z *.js *.css`
    # Note: brotli_static requires ngx_brotli module. If unavailable, gzip is used.
    # brotli_static on;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    # GAP-P1 PLATINUM FIX: Raised gzip level from 6 to 9 for max compression.
    # CPU overhead is negligible for static assets (served from disk cache).
    # On a 2G Syrian connection (256 kbps), this shaves ~200ms per 100KB asset.
    gzip_comp_level 9;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2
        application/manifest+json
        text/xml;

    # ─── Service Worker: MUST NOT be aggressively cached (W3C spec) ────
    # P1-NGX-001 FIX: Include security headers — child location blocks
    # with add_header override ALL parent add_header directives.
    location = /sw.js {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        expires off;
    }

    # ─── HTML Files: Short cache, revalidate ───────────────────────────
    # GAP-P1 PLATINUM FIX: HTML pages get smart caching — browsers revalidate
    # via ETag/Last-Modified on each visit, but skip re-download if unchanged.
    # This is critical for Syrian networks: avoid full re-download on every visit.
    location ~* \.html$ {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate";
        etag on;
    }

    # ─── Static Asset Caching (hashed filenames from Vite) ─────────────
    # P1-NGX-001 FIX: Include security headers — without this, JS/CSS/images
    # were served WITHOUT HSTS, CSP, X-Frame-Options, etc.
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        include /etc/nginx/conf.d/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Health Check Endpoint ─────────────────────────────────────────
    # P1-NGX-001 FIX: Full security header set via include (was partial).
    location = /healthz {
        include /etc/nginx/conf.d/security-headers.conf;
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ─── FRIC-2026-F07 FIX: Suspended Donor Pages ─────────────────────
    # Donation system is SUSPENDED INDEFINITELY (May 2026 strategic decision).
    # These 3 files remain in the codebase but must NOT be served to users or crawlers.
    # HTTP 410 Gone = "This resource existed but has been intentionally removed."
    # This is the correct status code per RFC 7231 §6.5.9 for permanent removal.
    # See: Knowledge Item "Nammerha Donation System Suspension (Indefinite)"
    location ~* ^/(donor-basket|donor-portal|donor-proof)(\.html)?$ {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Content-Type "text/html; charset=utf-8";
        return 410 '<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><title>410 Gone</title></head><body style="font-family:IBM Plex Sans Arabic,system-ui;text-align:center;padding:60px 20px;color:#475569"><h1 style="color:#0f172a">هذه الصفحة لم تعد متوفرة</h1><p>تم إيقاف نظام التبرعات مؤقتاً.</p><a href="/" style="color:#1558D6">العودة للرئيسية</a></body></html>';
    }

    # ─── MPA Routing — Serve HTML files directly ───────────────────────
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ─── Error Pages ───────────────────────────────────────────────────
    error_page 404 /index.html;

    # ─── P0-VE-001: Deep Link Verification (.well-known) ────────────────
    # Android App Links (assetlinks.json) and iOS Universal Links (AASA)
    # MUST be served with application/json and no redirects.
    # This block MUST come BEFORE the "deny hidden files" rule below,
    # otherwise `location ~ /\.` would block all `.well-known` requests.
    location /.well-known/ {
        include /etc/nginx/conf.d/security-headers.conf;
        default_type application/json;
        add_header Cache-Control "public, max-age=3600";
    }

    # ─── Deny hidden files (except .well-known above) ──────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
