# ── Nammerha — Shared Security Headers (P1-NGX-001 FIX)
# ─────────────────────────────────────────────────────────────────────────────
# Nginx's add_header directive in child `location` blocks COMPLETELY OVERRIDES
# all parent-level add_header directives. This include file must be referenced
# in every location block that uses add_header to ensure security headers are
# never silently dropped.
#
# Usage: include /etc/nginx/conf.d/security-headers.conf;
# ─────────────────────────────────────────────────────────────────────────────

add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "0" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(self)" always;
# P1-CSP-001 FIX: 'unsafe-inline' is INTENTIONALLY present in script-src.
# Vite's build output may inject inline <script> tags for module preloading
# and dynamic imports. Removing 'unsafe-inline' would break page loads.
# TODO: Migrate to CSP nonces (requires Nginx nonce module or backend-rendered pages).
# GAP-P1 PLATINUM FIX: Removed stale CDN domains (cdnjs.cloudflare.com,
# fonts.googleapis.com, fonts.gstatic.com) — all assets are now self-hosted.
# This tightens CSP and eliminates external CDN supply-chain attack vectors.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://*.nammerha.com https://*.openfreemap.org; connect-src 'self' https://*.nammerha.com https://*.auth0.com http://nammerha.com https://tiles.openfreemap.org https://*.openfreemap.org; frame-src 'self' https://checkout.fatora.io; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests; report-uri /api/csp-report" always;
