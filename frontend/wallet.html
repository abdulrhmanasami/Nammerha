<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <!-- FRC-006 FIX: Pre-paint FOUC guard — hidden until theme-boot.js sets data-theme -->
  <style>html:not([data-theme]){visibility:hidden}</style>
  <script src="/theme-boot.js"></script>
  <link rel="icon" type="image/svg+xml" href="/brand/Nammerha_logo_icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- P0-MOB-001 FIX: PWA installability -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#242424" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#F4F6F8" media="(prefers-color-scheme: light)">
  <title>Nammerha — Wallet | المحفظة</title>
  <meta name="description" content="View your escrow balances, donation history, and payment transactions." />
  <meta property="og:title" content="Wallet — Nammerha" />
  <meta property="og:description" content="View your escrow balances, donation history, and payment transactions." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://nammerha.com/brand/icon-512.png" />
  <meta name="twitter:card" content="summary" />
  <link rel="stylesheet" href="/fonts/phosphor/phosphor.css" />
  <script type="module" src="/src/pages/wallet.ts"></script>
  <link href="/i18n.css?v=7" rel="stylesheet"/>
</head>
<body class="bg-cloud-white font-display text-slate-900 antialiased">
<!-- P0-A1 FIX: Skip-to-content link (WCAG 2.4.1) -->
<a href="#main-content" class="skip-link" data-i18n="skip_to_content">Skip to content</a>
<main id="main-content" class="mobile-container min-h-screen flex flex-col pb-28">

  <!-- Header -->
  <header class="glass-nav sticky top-0 z-50">
    <div class="flex items-center justify-between px-4 h-16 max-w-md mx-auto">
      <!-- P1-MOB-001 FIX: Removed inline onclick — wired in wallet.ts via data-back-btn -->
      <a href="index.html" data-back-btn class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-trust-blue/5 transition-colors" aria-label="Go back" data-i18n-aria="aria_go_back">
        <i class="ph ph-arrow-left text-slate-700" aria-hidden="true"></i>
      </a>
      <h1 class="text-lg font-bold tracking-tight" data-i18n="wallet_title">Wallet</h1>
      <button id="scroll-to-history" class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-trust-blue/5 transition-colors" aria-label="Transaction history" data-i18n-aria="aria_transaction_history">
        <i class="ph ph-clock-counter-clockwise text-slate-700" aria-hidden="true"></i>
      </button>
    </div>
  </header>

  <!-- Balance Card -->
  <section class="px-4 pt-6 animate-fade-in-up">
    <div class="bg-gradient-to-br from-trust-blue to-blue-700 text-white rounded-2xl p-6 relative overflow-hidden">
      <p class="text-white/70 text-xs font-bold uppercase tracking-wider mb-1" data-i18n="total_escrow">Total Escrow Balance</p>
      <h2 id="escrow-balance" class="text-3xl font-extrabold tracking-tight">
        <span class="inline-block h-9 w-28 bg-white/20 rounded animate-pulse"></span>
      </h2>
      <div class="flex items-center gap-3 mt-4">
        <div class="flex items-center gap-1 text-white/80 text-xs">
          <i class="ph ph-lock-simple" style="font-size:14px" aria-hidden="true"></i>
          <span id="locked-count" data-i18n="locked_items">0 locked</span>
        </div>
        <div class="flex items-center gap-1 text-white/80 text-xs">
          <i class="ph ph-check-circle" style="font-size:14px" aria-hidden="true"></i>
          <span id="released-count" data-i18n="released_items">0 released</span>
        </div>
      </div>
      <div class="absolute -end-6 -bottom-6 size-24 bg-white/10 rounded-full blur-2xl"></div>
    </div>
  </section>

  <!-- Quick Actions -->
  <section class="px-4 pt-6">
    <div class="grid grid-cols-3 gap-3">
      <a href="donor-basket.html" class="glass-card flex flex-col items-center gap-2 p-4 rounded-xl text-center hover:shadow-md transition-shadow">
        <div class="size-10 bg-trust-blue/10 rounded-lg flex items-center justify-center">
          <i class="ph ph-hand-heart text-trust-blue" aria-hidden="true"></i>
        </div>
        <span class="text-[10px] font-bold text-slate-600 uppercase tracking-wider" data-i18n="donate">Donate</span>
      </a>
      <a href="donor-proof.html" class="glass-card flex flex-col items-center gap-2 p-4 rounded-xl text-center hover:shadow-md transition-shadow">
        <div class="size-10 bg-smoky-jade/10 rounded-lg flex items-center justify-center">
          <i class="ph ph-receipt text-smoky-jade" aria-hidden="true"></i>
        </div>
        <span class="text-[10px] font-bold text-slate-600 uppercase tracking-wider" data-i18n="receipts">Receipts</span>
      </a>
      <a href="donor-portal.html" class="glass-card flex flex-col items-center gap-2 p-4 rounded-xl text-center hover:shadow-md transition-shadow">
        <div class="size-10 bg-warm-earth/10 rounded-lg flex items-center justify-center">
          <i class="ph ph-chart-pie text-warm-earth" aria-hidden="true"></i>
        </div>
        <span class="text-[10px] font-bold text-slate-600 uppercase tracking-wider" data-i18n="impact">Impact</span>
      </a>
    </div>
  </section>

  <!-- Transaction History -->
  <section class="px-4 pt-8">
    <h3 class="text-sm font-bold uppercase tracking-wider text-slate-900 mb-3" data-i18n="recent_transactions">Recent Transactions</h3>
    <div id="transaction-list" class="flex flex-col gap-3">
      <!-- Skeleton loaders -->
      <div class="bg-white rounded-xl p-4 flex items-center gap-4 animate-pulse">
        <div class="size-10 bg-slate-200 rounded-lg"></div>
        <div class="flex-1 space-y-2">
          <div class="h-3 bg-slate-200 rounded w-3/4"></div>
          <div class="h-2 bg-slate-100 rounded w-1/2"></div>
        </div>
        <div class="h-4 bg-slate-200 rounded w-16"></div>
      </div>
      <div class="bg-white rounded-xl p-4 flex items-center gap-4 animate-pulse">
        <div class="size-10 bg-slate-200 rounded-lg"></div>
        <div class="flex-1 space-y-2">
          <div class="h-3 bg-slate-200 rounded w-2/3"></div>
          <div class="h-2 bg-slate-100 rounded w-1/3"></div>
        </div>
        <div class="h-4 bg-slate-200 rounded w-16"></div>
      </div>
    </div>
  </section>

  <!-- P2-UX-001 FIX: Decorative Gradient Orbs — visual consistency with homepage -->
  <div class="gradient-orb gradient-orb-primary gradient-orb-pos-end" aria-hidden="true"></div>
  <div class="gradient-orb gradient-orb-jade gradient-orb-pos-start" aria-hidden="true"></div>

</main>

<script src="/i18n.js?v=7" defer></script>
<!-- INC-002 FIX: Load wallet-specific i18n dictionary (was /i18n/profile.js — wrong page) -->
<script src="/i18n/wallet.js" defer></script>
<script src="/nav.js?v=7" defer></script>
</body>
</html>
