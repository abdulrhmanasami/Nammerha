<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <!-- FRC-006 FIX: Pre-paint FOUC guard — hidden until theme-boot.js sets data-theme -->
  <style>@keyframes _f{to{visibility:visible}}html:not([data-theme]){visibility:hidden;animation:_f 0s 1.5s forwards}</style>
  <script src="/theme-boot.js"></script>
  <link rel="icon" type="image/svg+xml" href="/brand/Nammerha_logo_icon.svg" />
  <link rel="apple-touch-icon" sizes="192x192" href="/brand/icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- CONF-P01 FIX: Enforceable CSP directives -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https:; font-src 'self'; object-src 'none'; base-uri 'self'" />
  <!-- P0-MOB-001 FIX: PWA installability -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#242424" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#F4F6F8" media="(prefers-color-scheme: light)">
  <title>Nammerha — BOQ Builder | بناء جدول الكميات</title>
  <meta name="description" content="Build a Bill of Quantities with material search, oracle pricing, and quantity controls." />
  <!-- DEF-013 FIX: Prevent search engine indexing of authenticated pages.
       Standard: SEO Best Practice — authenticated content must not be indexed. -->
  <meta name="robots" content="noindex, nofollow" />
  <meta property="og:title" content="Nammerha — BOQ Builder | بناء جدول الكميات" />
  <meta property="og:description" content="Build a Bill of Quantities with material search, oracle pricing, and quantity controls." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://nammerha.com/brand/og-default.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Nammerha — BOQ Builder | بناء جدول الكميات" />
  <link rel="preload" href="/fonts/ibm-plex-sans-arabic.css" as="style" />
  <link rel="stylesheet" href="/fonts/phosphor/phosphor.css" />
  <script type="module" src="/src/pages/engineer-boq.ts"></script>
<link href="/i18n.css?v=7" rel="stylesheet"/>
</head>
<body class="bg-cloud-white font-display text-slate-900 antialiased">
<!-- PE-001 FIX: Noscript fallback -->
<noscript>
  <style>html:not([data-theme]){visibility:visible!important}</style>
  <div class="nm-noscript">
    <p class="nm-noscript-title">نعمّرها تحتاج JavaScript</p>
    <p class="nm-noscript-desc">Nammerha requires JavaScript. Please enable it in your browser settings.</p>
  </div>
</noscript>
<!-- P0-A1 FIX: Skip-to-content link (WCAG 2.4.1) -->
<a href="#main-content" class="skip-link" data-i18n="skip_to_content">Skip to content</a>
<main id="main-content" class="mobile-container min-h-screen flex flex-col">

  <!-- GAP-004 FIX: Migrated from ad-hoc inline Tailwind to canonical .page-header.
       Previous: z-10 (wrong token), no backdrop-filter, hardcoded bg-white, ~64px height.
       Now: .page-header — correct z-index (--z-header: 30), glassmorphism, dark mode, 56px height.
       Standard: Design System Component Unity, Apple HIG (44pt touch targets). -->
  <header class="page-header">
    <a href="index.html" data-back-btn class="flex w-11 h-11 shrink-0 items-center justify-center rounded-full hover:bg-slate-200/50 transition-colors" aria-label="Go back" data-i18n-aria="aria_go_back">
      <i class="ph ph-arrow-left" aria-hidden="true"></i>
    </a>
    <!-- PLAT-UX-002 FIX: Unified to canonical Pattern A — h1 IS the visible title.
         Previous: <span> + sr-only <h1> — diverged from 7 other consumer pages.
         Now: Matches profile.html, wallet.html, projects.html, etc.
         Standard: WCAG 1.3.1 (single h1 per page), Component Pattern Unity. -->
    <h1 class="text-lg font-bold tracking-tight flex-1 text-center page-header-title" data-i18n="engineer_boq_builder">Engineer BOQ Builder</h1>
    <!-- GAP-UX-006 FIX: Spacer div for header title centering (matches profile.html pattern). -->
    <div class="w-11 h-11 shrink-0"></div>
  </header>

  <!-- PLAT-UX-002: sr-only h1 removed — h1 now lives inside .page-header (canonical Pattern A). -->

  <!-- Search Bar -->
  <div class="px-4 py-4 bg-white">
    <label class="flex flex-col w-full h-12">
      <div class="flex w-full flex-1 items-stretch rounded-xl h-full bg-slate-100 border border-slate-200 overflow-hidden">
        <div class="text-slate-500 flex items-center justify-center ps-4">
          <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
        </div>
        <input id="material-search" class="flex w-full min-w-0 flex-1 border-none bg-transparent focus:ring-0 text-slate-900 px-3 text-base font-normal placeholder:text-slate-500 outline-none" placeholder="Search materials (Cement, Steel, Doors)" data-i18n-placeholder="eng_search_materials" enterkeyhint="search" />
        <!-- GAP-UX-005 FIX: Removed dead microphone icon — voice search not implemented.
             Previous: mic icon implied voice search existed. Tapping did nothing.
             Standard: Honest Affordance Principle, Nielsen #2 (Match System ↔ Real World). -->
      </div>
    </label>
  </div>

  <!-- Section Title -->
  <div class="flex items-center justify-between px-4 pb-2 pt-6">
    <h2 class="text-sm font-bold uppercase tracking-wider text-slate-900" data-i18n="added_materials">Added Materials</h2>
    <span class="badge-primary">—</span>
  </div>

  <!-- Materials List — dynamically populated by engineer-boq.ts renderAllItems() -->
  <div class="flex flex-col gap-3 px-4 pb-32">
    <!-- Loading skeleton: replaced by JS on DOMContentLoaded -->
    <div class="boq-skeleton animate-pulse flex gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
      <div class="bg-slate-200 rounded-lg size-20 shrink-0"></div>
      <div class="flex flex-1 flex-col gap-3">
        <div class="h-4 bg-slate-200 rounded w-3/4"></div>
        <div class="h-3 bg-slate-100 rounded w-1/2"></div>
        <div class="flex items-center justify-between mt-1">
          <div class="h-5 bg-slate-200 rounded w-20"></div>
          <div class="h-8 bg-slate-100 rounded w-24"></div>
        </div>
      </div>
    </div>
    <div class="boq-skeleton animate-pulse flex gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
      <div class="bg-slate-200 rounded-lg size-20 shrink-0"></div>
      <div class="flex flex-1 flex-col gap-3">
        <div class="h-4 bg-slate-200 rounded w-2/3"></div>
        <div class="h-3 bg-slate-100 rounded w-2/5"></div>
        <div class="flex items-center justify-between mt-1">
          <div class="h-5 bg-slate-200 rounded w-20"></div>
          <div class="h-8 bg-slate-100 rounded w-24"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Sticky Bottom: Publish CTA + Nav -->
  <div class="fixed bottom-0 start-0 end-0 max-w-md mx-auto z-20">
    <div class="px-4 py-4 bg-gradient-to-t from-cloud-white via-cloud-white/95 to-transparent">
      <div class="flex flex-col gap-3">
        <div class="flex justify-between items-center px-2">
          <span class="text-slate-500 text-sm font-medium" data-i18n="total_project_estimate">Total Project Estimate</span>
          <span class="text-xl font-extrabold tracking-tight">—</span>
        </div>
        <!-- DEFER-P1-002 FIX: Was hardcoded English — no data-i18n on the MOST
             important CTA on the page. Syrian engineers see English in Arabic UI.
             Standard: Platform Translation Mandate, Nielsen #4 (Consistency). -->
        <button type="button" id="publish-btn" class="btn-primary w-full nm-btn-hero">
          <i class="ph ph-upload" aria-hidden="true"></i>
          <span data-i18n="eng_publish_to_marketplace">Publish to Marketplace</span>
        </button>
      </div>
    </div>
    <!-- CONF-UX-001 FIX: Removed inline 4-tab bottom nav.
         Previous: Dual navigation collision — inline nav at z-20 + unified nav.js at z-9900.
         The unified nav physically covered the "Publish to Marketplace" CTA.
         Now: engineer-boq.html is in HIDE_NAV_PAGES (nav.js won't inject), and
         this inline nav is removed. Back navigation via .page-header back button.
         Standard: Apple HIG (Single Navigation System), Nielsen #4 (Consistency). -->
    <!-- PLAT-UX-001 FIX: Migrated from inline style to canonical .nm-nav-safe-area class.
         Previous: style="height: max(env(safe-area-inset-bottom, 0px), 8px)" — last inline safe-area style.
         Now: Reuses _nav.css L185 .nm-nav-safe-area (same height rule).
         Standard: P1-SST-001 (CSS Single Source of Truth). -->
    <div class="nm-nav-safe-area"></div>
  </div>

</main>
<!-- COS-003 FIX: Decorative gradient orbs — visual consistency with consumer pages -->
<div class="gradient-orb gradient-orb-primary gradient-orb-pos-end" aria-hidden="true"></div>
<div class="gradient-orb gradient-orb-jade gradient-orb-pos-start" aria-hidden="true"></div>

<!-- LEG-001 FIX: Legal footer — Terms, Privacy, Refund links (Platinum Standard) -->
<footer class="nm-legal-footer">
  <nav aria-label="Legal navigation">
    <a href="/terms.html" data-i18n="footer_terms">Terms</a>
    <a href="/privacy.html" data-i18n="footer_privacy">Privacy</a>
    <a href="/refund-policy.html" data-i18n="footer_refund">Refund Policy</a>
  </nav>
  <p class="nm-copyright" data-i18n="footer_copyright">© 2026 Nammerha. All rights reserved.</p>
</footer>

<script src="/i18n.js?v=7" defer></script>
<script src="/i18n/engineer.js" defer></script>
<!-- GAP-2601 FIX: Page Load Guard — detects TS module hydration failures and shows retry UI.
     Standard: Progressive Enhancement, Nielsen #1 (System Status Visibility). -->
<script src="/load-guard.js" defer></script>
<script src="/nav.js?v=7" defer></script>
</body>
</html>
