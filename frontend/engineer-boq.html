<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/brand/Nammerha_logo_icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nammerha — Engineer BOQ Builder</title>
  <meta name="description" content="Build a Bill of Quantities with material search, oracle pricing, and quantity controls." />
  <link rel="stylesheet" href="/fonts/phosphor/phosphor.css" />
  <script type="module" src="/src/pages/engineer-boq.ts"></script>
<link href="/i18n.css?v=5" rel="stylesheet"/>
</head>
<body class="bg-cloud-white font-display text-slate-900 antialiased">
<div class="mobile-container min-h-screen flex flex-col">

  <!-- Header -->
  <div class="sticky top-0 z-10 flex items-center bg-white p-4 border-b border-slate-200 justify-between">
    <a href="index.html" class="text-slate-900 flex size-10 shrink-0 items-center justify-center cursor-pointer">
      <i class="ph ph-arrow-left" aria-hidden="true"></i>
    </a>
    <h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center" data-i18n="engineer_boq_builder">Engineer BOQ Builder</h2>
    <div class="flex size-10 items-center justify-end">
      <button class="flex items-center justify-center text-slate-900">
        <i class="ph ph-dots-three-vertical" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <!-- Search Bar -->
  <div class="px-4 py-4 bg-white">
    <label class="flex flex-col w-full h-12">
      <div class="flex w-full flex-1 items-stretch rounded-xl h-full bg-slate-100 border border-slate-200 overflow-hidden">
        <div class="text-slate-500 flex items-center justify-center pl-4">
          <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
        </div>
        <input id="material-search" class="flex w-full min-w-0 flex-1 border-none bg-transparent focus:ring-0 text-slate-900 px-3 text-base font-normal placeholder:text-slate-500 outline-none" placeholder="Search materials (Cement, Steel, Doors)" data-i18n-placeholder="eng_search_materials" />
        <div class="text-slate-500 flex items-center justify-center pr-4">
          <i class="ph ph-microphone" aria-hidden="true"></i>
        </div>
      </div>
    </label>
  </div>

  <!-- Section Title -->
  <div class="flex items-center justify-between px-4 pb-2 pt-6">
    <h3 class="text-sm font-bold uppercase tracking-wider text-slate-900" data-i18n="added_materials">Added Materials</h3>
    <span class="badge-primary">—</span>
  </div>

  <!-- Materials List — dynamically populated by engineer-boq.ts renderAllItems() -->
  <div class="flex flex-col gap-3 px-4 pb-32">
    <!-- Loading skeleton: replaced by JS on DOMContentLoaded -->
    <div class="boq-skeleton animate-pulse flex gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
      <div class="bg-slate-200 rounded-lg size-20 shrink-0"></div>
      <div class="flex flex-1 flex-col gap-3">
        <div class="h-4 bg-slate-200 rounded w-3/4"></div>
        <div class="h-3 bg-slate-100 rounded w-1/2"></div>
        <div class="flex items-center justify-between mt-1">
          <div class="h-5 bg-slate-200 rounded w-20"></div>
          <div class="h-8 bg-slate-100 rounded w-24"></div>
        </div>
      </div>
    </div>
    <div class="boq-skeleton animate-pulse flex gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
      <div class="bg-slate-200 rounded-lg size-20 shrink-0"></div>
      <div class="flex flex-1 flex-col gap-3">
        <div class="h-4 bg-slate-200 rounded w-2/3"></div>
        <div class="h-3 bg-slate-100 rounded w-2/5"></div>
        <div class="flex items-center justify-between mt-1">
          <div class="h-5 bg-slate-200 rounded w-20"></div>
          <div class="h-8 bg-slate-100 rounded w-24"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Sticky Bottom: Publish CTA + Nav -->
  <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto z-20">
    <div class="px-4 py-4 bg-gradient-to-t from-cloud-white via-cloud-white/95 to-transparent">
      <div class="flex flex-col gap-3">
        <div class="flex justify-between items-center px-2">
          <span class="text-slate-500 text-sm font-medium" data-i18n="total_project_estimate">Total Project Estimate</span>
          <span class="text-xl font-extrabold tracking-tight">—</span>
        </div>
        <button id="publish-btn" class="btn-primary w-full !h-14 !text-lg">
          <i class="ph ph-upload" aria-hidden="true"></i>
          Publish to Marketplace
        </button>
      </div>
    </div>
    <!-- Bottom Nav -->
    <div class="flex gap-2 border-t border-slate-200 bg-white px-4 pb-6 pt-2">
      <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="index.html">
        <i class="ph ph-squares-four" aria-hidden="true"></i>
        <p class="text-[10px] font-bold uppercase tracking-wider" data-i18n="projects">Projects</p>
      </a>
      <a class="flex flex-1 flex-col items-center justify-center gap-1 text-trust-blue" href="engineer-boq.html">
        <i class="ph ph-clipboard-text" aria-hidden="true"></i>
        <p class="text-[10px] font-bold uppercase tracking-wider" data-i18n="boq">BOQ</p>
      </a>
      <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="admin-oracle.html">
        <i class="ph ph-chart-line-up" aria-hidden="true"></i>
        <p class="text-[10px] font-bold uppercase tracking-wider" data-i18n="oracle">Oracle</p>
      </a>
      <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="profile.html">
        <i class="ph ph-user" aria-hidden="true"></i>
        <p class="text-[10px] font-bold uppercase tracking-wider" data-i18n="profile">Profile</p>
      </a>
    </div>
  </div>

</div>
<script src="/i18n.js?v=6" defer></script>
<script src="/nav.js?v=6" defer></script>
</body>
</html>
