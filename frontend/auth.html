<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <script src="/theme-boot.js"></script>
    <link rel="icon" type="image/svg+xml" href="/brand/Nammerha_logo_icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- P0-MOB-001 FIX: PWA installability -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#242424" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#F4F6F8" media="(prefers-color-scheme: light)">
  <title>Nammerha — Sign In</title>
  <meta name="description" content="Sign in to Nammerha — the OCDS-compliant reconstruction platform rebuilding Syria with transparency." />
  <!-- I-004 FIX: OpenGraph & Twitter Card meta tags for social sharing -->
  <meta property="og:title" content="Sign In — Nammerha" />
  <meta property="og:description" content="Sign in to Nammerha — the OCDS-compliant reconstruction platform rebuilding Syria with transparency." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/brand/Nammerha_logo_icon.svg" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Sign In — Nammerha" />
  <link rel="stylesheet" href="/fonts/phosphor/phosphor.css" />
  <script type="module" src="/src/pages/auth.ts"></script>
  <link href="/i18n.css?v=7" rel="stylesheet"/>
</head>
<body class="bg-cloud-white font-display text-slate-900 antialiased">
  <!-- P0-A1 FIX: Skip-to-content link (WCAG 2.4.1) -->
  <a href="#main-content" class="skip-link" data-i18n="skip_to_content">Skip to content</a>
  <div id="main-content" class="mobile-container flex flex-col relative min-h-screen">

    <!-- Brand Header -->
    <header class="px-6 pt-12 pb-6 text-center relative z-10">
      <img src="/brand/Nammerha_logo_Full.svg" alt="Nammerha — نعمّرها" class="h-28 w-auto mx-auto mb-2" />
      <p class="text-sm text-slate-500 mt-1" data-i18n="auth_subtitle">Rebuild Syria Together</p>
      <!-- P2-004 FIX: Escape hatch — users can navigate away from auth -->
      <a href="index.html" class="inline-flex items-center gap-1.5 text-xs text-slate-400 hover:text-trust-blue transition-colors mt-3" data-i18n="auth_back_home">
        <i class="ph ph-arrow-left" style="font-size:12px" aria-hidden="true"></i> Back to Home
      </a>
    </header>

    <!-- Tab Switcher -->
    <div class="px-6 mb-6 relative z-10">
      <div class="flex bg-slate-200/60 rounded-full p-1">
        <button id="tab-login" class="auth-tab auth-tab-active flex-1 py-2.5 rounded-full text-sm font-bold transition-all" data-i18n="sign_in">Sign In</button>
        <button id="tab-register" class="auth-tab flex-1 py-2.5 rounded-full text-sm font-bold transition-all text-slate-500" data-i18n="create_account">Create Account</button>
      </div>
    </div>
    <!-- PLT-AUD-C005 FIX: Theme toggle — fixed position to avoid landscape overlap with tab container -->
    <!-- P1-AUTH-OVERLAP FIX: Uses fixed instead of absolute to prevent stacking issues on small landscape screens -->
    <button id="nm-theme-toggle" class="fixed top-3 z-50 w-9 h-9 rounded-full border border-slate-200 bg-white/90 backdrop-blur flex items-center justify-center cursor-pointer shadow-sm transition-all touch-safe" style="inset-inline-end: 0.75rem; margin-top: env(safe-area-inset-top, 0px);" aria-label="Toggle theme" data-i18n-aria="aria_toggle_theme">
      <i id="nm-theme-toggle-icon" class="ph ph-sun-dim text-amber-500" aria-hidden="true" style="font-size:18px"></i>
    </button>

    <!-- Error/Success Banner -->
    <!-- P0-A2 FIX: aria-live region for screen reader announcement of status changes (WCAG 4.1.3) -->
    <div class="px-6 mb-4 relative z-10" id="auth-banner" role="alert" aria-live="assertive" style="display:none">
      <div class="rounded-xl p-3 text-sm font-medium flex items-center gap-2" id="auth-banner-inner">
        <i class="ph" id="auth-banner-icon" aria-hidden="true"></i>
        <span id="auth-banner-text"></span>
      </div>
    </div>

    <!-- LOGIN FORM -->
    <form id="form-login" class="px-6 flex flex-col gap-4 relative z-10" novalidate>
      <!-- Email -->
      <div>
        <label for="login-email" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="email_label">Email Address</label>
        <div class="relative">
          <i class="ph ph-envelope absolute start-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <input id="login-email" name="email" type="email" required autocomplete="email"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 ps-12 pe-4 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="you@example.com" data-i18n-placeholder="auth_email_placeholder" />
        </div>
      </div>
      <!-- Password -->
      <div>
        <label for="login-password" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="password_label">Password</label>
        <div class="relative">
          <i class="ph ph-lock absolute start-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <input id="login-password" name="password" type="password" required autocomplete="current-password" minlength="8"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 ps-12 pe-12 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="••••••••" data-i18n-placeholder="auth_pw_dots" />
          <button type="button" id="login-toggle-pw" class="absolute end-3 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-slate-600" aria-label="Toggle password visibility" data-i18n-aria="aria_toggle_password">
            <i class="ph ph-eye" style="font-size:20px" aria-hidden="true"></i>
          </button>
        </div>
      </div>
      <!-- Submit -->
      <button type="submit" id="login-submit" class="btn-primary mt-2">
        <i class="ph ph-sign-in" aria-hidden="true"></i>
        <span id="login-submit-text" data-i18n="sign_in_btn">Sign In</span>
      </button>
      <!-- PLT-AUD-002: Forgot Password Link -->
      <div class="text-center mt-3">
        <button type="button" id="forgot-password-btn" class="text-sm text-trust-blue font-medium hover:underline" data-i18n="forgot_password">Forgot your password?</button>
      </div>
    </form>

    <!-- REGISTER FORM (hidden by default) -->
    <form id="form-register" class="px-6 flex flex-col gap-4 relative z-10" novalidate style="display:none">
      <!-- Full Name -->
      <div>
        <label for="reg-name" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="full_name_label">Full Name</label>
        <div class="relative">
          <i class="ph ph-user absolute start-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <input id="reg-name" name="full_name" type="text" required autocomplete="name"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 ps-12 pe-4 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="Full Name" data-i18n-placeholder="auth_name_placeholder" />
        </div>
      </div>
      <!-- Email -->
      <div>
        <label for="reg-email" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="email_label">Email Address</label>
        <div class="relative">
          <i class="ph ph-envelope absolute start-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <input id="reg-email" name="email" type="email" required autocomplete="email"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 ps-12 pe-4 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="you@example.com" data-i18n-placeholder="auth_email_placeholder" />
        </div>
      </div>
      <!-- Password -->
      <div>
        <label for="reg-password" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="password_label">Password</label>
        <div class="relative">
          <i class="ph ph-lock absolute start-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <input id="reg-password" name="password" type="password" required autocomplete="new-password" minlength="8"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 ps-12 pe-12 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="Min 8 chars, 1 uppercase, 1 number" data-i18n-placeholder="auth_pw_placeholder" />
          <button type="button" id="reg-toggle-pw" class="absolute end-3 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-slate-600" aria-label="Toggle password visibility" data-i18n-aria="aria_toggle_password">
            <i class="ph ph-eye" style="font-size:20px" aria-hidden="true"></i>
          </button>
        </div>
        <!-- Password Strength -->
        <div class="mt-2 flex gap-1" id="pw-strength-bars">
          <div class="h-2 flex-1 rounded-full bg-slate-200"></div>
          <div class="h-2 flex-1 rounded-full bg-slate-200"></div>
          <div class="h-2 flex-1 rounded-full bg-slate-200"></div>
          <div class="h-2 flex-1 rounded-full bg-slate-200"></div>
        </div>
        <p class="text-[10px] text-slate-400 mt-1" id="pw-strength-label" data-i18n="pw_requirements">8+ chars, 1 uppercase, 1 number</p>
      </div>
      <!-- Multi-Role Architecture: Role selection removed from registration.
           Users start as 'donor' by default and activate additional roles from dashboard. -->

      <!-- Submit -->
      <button type="submit" id="reg-submit" class="btn-primary mt-2">
        <i class="ph ph-user-plus" aria-hidden="true"></i>
        <span id="reg-submit-text" data-i18n="create_account_btn">Create Account</span>
      </button>
    </form>

    <!-- Trust Footer -->
    <div class="mt-auto px-6 py-8 text-center relative z-10">
      <div class="flex items-center justify-center gap-4 mb-3">
        <div class="flex items-center gap-1 text-[10px] text-slate-400 font-medium">
          <i class="ph ph-shield-check text-smoky-jade" style="font-size:14px" aria-hidden="true"></i>
          <span data-i18n="auth_trust_1">OCDS Verified</span>
        </div>
        <div class="flex items-center gap-1 text-[10px] text-slate-400 font-medium">
          <i class="ph ph-lock text-trust-blue" style="font-size:14px" aria-hidden="true"></i>
          <span data-i18n="auth_trust_2">256-bit Encrypted</span>
        </div>
      </div>
      <!-- P1-F3 FIX: Entire legal sentence translatable via single i18n key.
           Previous: "By continuing, you agree to our" and "and" were hardcoded English. -->
      <p class="text-[10px] text-slate-400" data-i18n-html="auth_footer_legal">By continuing, you agree to our <a href="/terms.html" class="underline hover:text-trust-blue transition-colors">Terms of Service</a> and <a href="/privacy.html" class="underline hover:text-trust-blue transition-colors">Privacy Policy</a>.</p>
    </div>

  </div>

  <!-- P0-ARCH-001 FIX: RTL-safe logical properties via CSS classes (was hardcoded right/left) -->
  <div class="gradient-orb gradient-orb-primary gradient-orb-pos-end" aria-hidden="true"></div>
  <div class="gradient-orb gradient-orb-jade gradient-orb-pos-start" aria-hidden="true"></div>
<script src="/i18n.js?v=7" defer></script>
<script src="/theme-toggle.js?v=1" defer></script>
</body>
</html>
