<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <!-- FRC-006 FIX: Pre-paint FOUC guard — hidden until theme-boot.js sets data-theme -->
  <style>html:not([data-theme]){visibility:hidden}</style>
  <script src="/theme-boot.js"></script>
    <link rel="icon" type="image/svg+xml" href="/brand/Nammerha_logo_icon.svg" />
  <link rel="apple-touch-icon" sizes="192x192" href="/brand/icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CONF-P01 FIX: Enforceable CSP directives (frame-ancestors removed — ignored in meta tags per CSP L2 §4.1) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https:; font-src 'self'; object-src 'none'; base-uri 'self'" />
  <!-- P0-MOB-001 FIX: PWA installability -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#242424" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#F4F6F8" media="(prefers-color-scheme: light)">
  <title>Nammerha — Sign In | تسجيل الدخول</title>
  <meta name="description" content="Sign in to Nammerha — the OCDS-compliant reconstruction platform rebuilding Syria with transparency." />
  <!-- I-004 FIX: OpenGraph & Twitter Card meta tags for social sharing -->
  <meta property="og:title" content="Sign In — Nammerha" />
  <meta property="og:description" content="Sign in to Nammerha — the OCDS-compliant reconstruction platform rebuilding Syria with transparency." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://nammerha.com/brand/icon-512.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Sign In — Nammerha" />
  <link rel="preload" href="/fonts/ibm-plex-sans-arabic.css" as="style" />
  <link rel="stylesheet" href="/fonts/phosphor/phosphor.css" />
  <script type="module" src="/src/pages/auth.ts"></script>
  <link href="/i18n.css?v=7" rel="stylesheet"/>
</head>
<body class="bg-cloud-white font-display text-slate-900 antialiased">
<!-- GAP-010 FIX: Noscript fallback -->
<noscript>
  <style>html:not([data-theme]){visibility:visible!important}</style>
  <div style="padding:2rem;text-align:center;font-family:system-ui;direction:rtl;">
    <p style="font-size:1.25rem;font-weight:700;">نعمّرها تحتاج JavaScript</p>
    <p style="margin-top:0.5rem;color:#64748b;">Nammerha requires JavaScript. Please enable it in your browser settings.</p>
  </div>
</noscript>
  <!-- P0-A1 FIX: Skip-to-content link (WCAG 2.4.1) -->
  <a href="#main-content" class="skip-link" data-i18n="skip_to_content">Skip to content</a>
  <!-- CONF-N05 FIX: Removed mobile-container (max-width: 448px) — breaks immersive auth on tablets.
       Auth page has full-viewport gradient orbs and centered brand header that need edge-to-edge presentation.
       Now uses max-w-lg (512px) for the content area via CSS, with full-width background.
       Standard: Apple HIG — Full-screen immersive experiences should not be artificially constrained. -->
  <main id="main-content" class="flex flex-col relative min-h-screen" style="max-width: 32rem; margin-inline: auto;">

    <!-- Brand Header -->
    <header class="px-6 pt-12 pb-6 text-center relative z-10">
      <img src="/brand/Nammerha_logo_Full.svg" alt="Nammerha — نعمّرها" class="h-28 w-auto mx-auto mb-2" />
      <p class="text-sm text-slate-500 mt-1" data-i18n="auth_subtitle">Rebuild Syria Together</p>
      <!-- CONF-NEW-05 FIX: Escape hatch visibility dramatically improved.
           Previous: 12px text-slate-400 — nearly invisible on the page.
           Now: 13px, text-slate-500, underline, icon enlarged — obvious exit path.
           Standard: Nielsen #3 (User Control), Apple HIG (Clear Escape Routes). -->
      <a href="index.html" class="inline-flex items-center gap-2 text-[13px] font-medium text-slate-500 hover:text-trust-blue underline decoration-slate-300 hover:decoration-trust-blue underline-offset-4 transition-colors mt-3" data-i18n="auth_back_home">
        <i class="ph ph-arrow-left" style="font-size:14px" aria-hidden="true"></i> Back to Home
      </a>
    </header>

    <!-- INC-P04 FIX: WAI-ARIA Tabs pattern for screen reader accessibility (WCAG 4.1.2) -->
    <div class="px-6 mb-6 relative z-10">
      <div class="flex bg-slate-200/60 rounded-full p-1" role="tablist" aria-label="Authentication method">
        <button id="tab-login" role="tab" aria-selected="true" aria-controls="form-login" class="auth-tab auth-tab-active flex-1 py-2.5 rounded-full text-sm font-bold transition-all" data-i18n="sign_in">Sign In</button>
        <button id="tab-register" role="tab" aria-selected="false" aria-controls="form-register" class="auth-tab flex-1 py-2.5 rounded-full text-sm font-bold transition-all text-slate-500" data-i18n="create_account">Create Account</button>
      </div>
    </div>
    <!-- PLT-AUD-C005 FIX: Theme toggle — fixed position to avoid landscape overlap with tab container -->
    <!-- CONF-005 FIX: On landscape phones (<500px height), repositioned to avoid tab switcher overlap.
         Standard: Apple HIG — Controls must not obscure actionable content. -->
    <style>
      @media (max-height: 500px) and (orientation: landscape) {
        #nm-theme-toggle { top: auto !important; bottom: 0.75rem !important; }
      }
    </style>
    <!-- CONF-003 FIX: Auth theme toggle delegates to NammerhaTheme (nav.js shared module).
         This ensures theme state is consistent across all pages.
         Position: fixed top-right matches auth layout (no bottom-nav on auth). -->
    <button id="nm-theme-toggle" class="fixed top-3 z-50 w-9 h-9 rounded-full border border-slate-200 bg-white/90 backdrop-blur flex items-center justify-center cursor-pointer shadow-sm transition-all touch-safe" style="inset-inline-end: 0.75rem; margin-top: env(safe-area-inset-top, 0px);" aria-label="Toggle theme" data-i18n-aria="aria_toggle_theme">
      <i id="nm-theme-toggle-icon" class="ph ph-sun-dim text-amber-500" aria-hidden="true" style="font-size:18px"></i>
    </button>

    <!-- Error/Success Banner -->
    <!-- P0-A2 FIX: aria-live region for screen reader announcement of status changes (WCAG 4.1.3) -->
    <div class="px-6 mb-4 relative z-10" id="auth-banner" role="alert" aria-live="assertive" style="display:none">
      <div class="rounded-xl p-3 text-sm font-medium flex items-center gap-2" id="auth-banner-inner">
        <i class="ph" id="auth-banner-icon" aria-hidden="true"></i>
        <span id="auth-banner-text"></span>
      </div>
    </div>

    <!-- LOGIN FORM -->
    <!-- FRC-009 FIX: auth-panel class enables CSS fade-slide transitions -->
    <form id="form-login" class="auth-panel px-6 flex flex-col gap-4 relative z-10" novalidate>
      <!-- Email -->
      <div>
        <label for="login-email" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="email_label">Email Address</label>
        <div class="relative">
          <i class="ph ph-envelope absolute start-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <!-- FRC-P08 FIX: enterkeyhint for mobile keyboard context -->
          <input id="login-email" name="email" type="email" required autocomplete="email" enterkeyhint="next"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 ps-12 pe-4 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="you@example.com" data-i18n-placeholder="auth_email_placeholder" />
        </div>
      </div>
      <!-- Password -->
      <div>
        <label for="login-password" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="password_label">Password</label>
        <div class="relative">
          <i class="ph ph-lock absolute start-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <input id="login-password" name="password" type="password" required autocomplete="current-password" minlength="8" enterkeyhint="go"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 ps-12 pe-12 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="••••••••" data-i18n-placeholder="auth_pw_dots" />
          <button type="button" id="login-toggle-pw" class="absolute end-3 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-slate-600" aria-label="Toggle password visibility" data-i18n-aria="aria_toggle_password">
            <i class="ph ph-eye" style="font-size:20px" aria-hidden="true"></i>
          </button>
        </div>
      </div>
      <!-- Submit -->
      <button type="submit" id="login-submit" class="btn-primary mt-2">
        <i class="ph ph-sign-in" aria-hidden="true"></i>
        <span id="login-submit-text" data-i18n="sign_in_btn">Sign In</span>
      </button>
      <!-- PLT-AUD-002: Forgot Password Link -->
      <!-- GAP-004 FIX: <a> with mailto fallback replaces dead <button> for progressive enhancement.
           If auth.ts loads, JS intercepts and shows inline reset flow.
           If JS fails, user still reaches support. Standard: Progressive Enhancement. -->
      <div class="text-center mt-3">
        <a href="mailto:support@nammerha.com?subject=Password%20Reset%20Request" id="forgot-password-btn" class="text-sm text-trust-blue font-medium hover:underline" data-i18n="forgot_password">Forgot your password?</a>
      </div>

      <!-- FRC-003 FIX: Social Login — reduces friction for mobile users.
           Standard: Industry best practice — OAuth/SSO reduces registration drop-off by ~30%.
           Google Brand Guidelines: White bg, Google logo, "Sign in with Google" text.
           Apple HIG: Dark bg, Apple logo, "Sign in with Apple" text. -->
      <div class="relative flex items-center gap-3 my-4">
        <div class="flex-1 h-px bg-slate-200"></div>
        <span class="text-xs font-bold text-slate-400 uppercase" data-i18n="auth_or_divider">or</span>
        <div class="flex-1 h-px bg-slate-200"></div>
      </div>
        <!-- FRC-P07 FIX: SSO marked 'Coming Soon' — prevents dead-end trust violations (Nielsen Heuristic #2) -->
        <!-- Google SSO -->
        <button type="button" id="google-sso-btn" class="sso-coming-soon w-full flex items-center justify-center gap-3 py-3 px-4 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 text-sm font-bold text-slate-700 transition-colors" data-coming-soon="Soon">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          <span data-i18n="auth_google_sso">Sign in with Google</span>
        </button>
        <!-- Apple SSO -->
        <button type="button" id="apple-sso-btn" class="sso-coming-soon w-full flex items-center justify-center gap-3 py-3 px-4 rounded-xl bg-slate-900 hover:bg-slate-800 text-sm font-bold text-white transition-colors" data-coming-soon="Soon">
          <svg width="17" height="20" viewBox="0 0 17 20" fill="currentColor" aria-hidden="true">
            <path d="M13.545 10.58c-.015-1.65.614-3.173 1.74-4.275-.948-1.2-2.397-1.935-3.95-2.01-1.663-.17-3.27 1-4.11 1s-2.17-.98-3.57-.95c-1.84.06-3.54 1.08-4.48 2.73-1.93 3.34-.49 8.27 1.36 10.97.93 1.33 2.02 2.82 3.44 2.77 1.39-.06 1.91-.88 3.58-.88 1.66 0 2.15.88 3.61.85 1.49-.03 2.44-1.34 3.33-2.68.66-.95 1.17-2 1.51-3.11-1.81-.72-3.03-2.49-3.5-4.26zM11.04 2.68c.72-.9 1.12-2.04 1.1-3.19-1.13.06-2.18.56-2.96 1.4-.77.84-1.18 1.97-1.13 3.13 1.14.04 2.22-.44 2.99-1.34z"/>
          </svg>
          <span data-i18n="auth_apple_sso">Sign in with Apple</span>
        </button>
      </div>
    </form>

    <!-- REGISTER FORM (hidden by default) -->
    <!-- FRC-009 FIX: auth-panel class enables CSS fade-slide transitions -->
    <form id="form-register" class="auth-panel px-6 flex flex-col gap-4 relative z-10" novalidate style="display:none">
      <!-- Full Name -->
      <div>
        <label for="reg-name" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="full_name_label">Full Name</label>
        <div class="relative">
          <i class="ph ph-user absolute start-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <input id="reg-name" name="full_name" type="text" required autocomplete="name"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 ps-12 pe-4 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="Full Name" data-i18n-placeholder="auth_name_placeholder" />
        </div>
      </div>
      <!-- Email -->
      <div>
        <label for="reg-email" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="email_label">Email Address</label>
        <div class="relative">
          <i class="ph ph-envelope absolute start-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <input id="reg-email" name="email" type="email" required autocomplete="email"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 ps-12 pe-4 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="you@example.com" data-i18n-placeholder="auth_email_placeholder" />
        </div>
      </div>
      <!-- Password -->
      <div>
        <label for="reg-password" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="password_label">Password</label>
        <div class="relative">
          <i class="ph ph-lock absolute start-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <input id="reg-password" name="password" type="password" required autocomplete="new-password" minlength="8"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 ps-12 pe-12 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="Min 8 chars, 1 uppercase, 1 number" data-i18n-placeholder="auth_pw_placeholder" />
          <button type="button" id="reg-toggle-pw" class="absolute end-3 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-slate-600" aria-label="Toggle password visibility" data-i18n-aria="aria_toggle_password">
            <i class="ph ph-eye" style="font-size:20px" aria-hidden="true"></i>
          </button>
        </div>
        <!-- Password Strength -->
        <div class="mt-2 flex gap-1" id="pw-strength-bars">
          <div class="h-2 flex-1 rounded-full bg-slate-200"></div>
          <div class="h-2 flex-1 rounded-full bg-slate-200"></div>
          <div class="h-2 flex-1 rounded-full bg-slate-200"></div>
          <div class="h-2 flex-1 rounded-full bg-slate-200"></div>
        </div>
        <p class="text-[10px] text-slate-400 mt-1" id="pw-strength-label" data-i18n="pw_requirements">8+ chars, 1 uppercase, 1 number</p>
      </div>
      <!-- FRC-002 FIX: Confirm Password field — industry standard for registration.
           Especially critical for Arabic-script users who may accidentally toggle keyboards.
           Standard: Industry best practice for new account creation. -->
      <div>
        <label for="reg-password-confirm" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="confirm_password_label">Confirm Password</label>
        <div class="relative">
          <i class="ph ph-lock-key absolute start-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <input id="reg-password-confirm" name="password_confirm" type="password" required autocomplete="new-password" minlength="8"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 ps-12 pe-4 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="Re-enter your password" data-i18n-placeholder="auth_pw_confirm_placeholder" />
        </div>
        <p class="text-[10px] text-red-500 mt-1 hidden" id="pw-mismatch-error" data-i18n="pw_mismatch_error">Passwords do not match</p>
      </div>
      <!-- Multi-Role Architecture: Role selection removed from registration.
           Users start as 'donor' by default and activate additional roles from dashboard. -->

      <!-- GAP-X05 FIX: Active consent checkbox — GDPR Art. 7 requires demonstrable consent.
           Previous: passive footer text "By continuing, you agree..." — legally insufficient.
           Standard: GDPR Art. 7, ePrivacy Directive, Industry registration standards. -->
      <div class="flex items-start gap-3 mt-1">
        <input id="reg-terms" name="terms" type="checkbox" required
          class="mt-1 w-4 h-4 accent-trust-blue rounded cursor-pointer shrink-0" />
        <label for="reg-terms" class="text-[11px] text-slate-500 leading-relaxed cursor-pointer">
          <span data-i18n-html="auth_terms_agree">I agree to the <a href="/terms.html" class="text-trust-blue underline hover:text-trust-blue/80 transition-colors" target="_blank">Terms of Service</a> and <a href="/privacy.html" class="text-trust-blue underline hover:text-trust-blue/80 transition-colors" target="_blank">Privacy Policy</a></span>
        </label>
      </div>

      <!-- Submit -->
      <button type="submit" id="reg-submit" class="btn-primary mt-2">
        <i class="ph ph-user-plus" aria-hidden="true"></i>
        <span id="reg-submit-text" data-i18n="create_account_btn">Create Account</span>
      </button>
    </form>

    <!-- Trust Footer -->
    <!-- FRC-N03 FIX: Progressive disclosure for trust signals.
         Previous: OCDS/Encryption badges shown alongside login form — cognitive overload.
         Now: collapsed into a "Security Details" drawer. Legal text always visible.
         Standard: Nielsen #8 — "Aesthetic and minimalist design." -->
    <div class="mt-auto px-6 py-8 text-center relative z-10">
      <details class="mb-3">
        <summary class="text-[10px] text-slate-400 font-bold uppercase tracking-wider cursor-pointer hover:text-trust-blue transition-colors inline-flex items-center gap-1">
          <i class="ph ph-shield-check" style="font-size:12px" aria-hidden="true"></i>
          <span data-i18n="auth_security_details">Security Details</span>
        </summary>
        <div class="flex items-center justify-center gap-4 mt-2 animate-fade-in-up">
          <div class="flex items-center gap-1 text-[10px] text-slate-400 font-medium">
            <i class="ph ph-shield-check text-smoky-jade" style="font-size:14px" aria-hidden="true"></i>
            <span data-i18n="auth_trust_1">OCDS Verified</span>
          </div>
          <div class="flex items-center gap-1 text-[10px] text-slate-400 font-medium">
            <i class="ph ph-lock text-trust-blue" style="font-size:14px" aria-hidden="true"></i>
            <span data-i18n="auth_trust_2">256-bit Encrypted</span>
          </div>
        </div>
      </details>
      <!-- CONF-N02 FIX: Removed passive footer text "By continuing, you agree..."
           The explicit checkbox consent (L221-227) is the binding legal mechanism per GDPR Art. 7.
           Having both created dual consent ambiguity — one demonstrable act is required.
           Standard: GDPR Art. 7, ePrivacy Directive, Nielsen Heuristic #8 (Minimalist Design). -->
    </div>

  </main>

  <!-- P0-ARCH-001 FIX: RTL-safe logical properties via CSS classes (was hardcoded right/left) -->
  <div class="gradient-orb gradient-orb-primary gradient-orb-pos-end" aria-hidden="true"></div>
  <div class="gradient-orb gradient-orb-jade gradient-orb-pos-start" aria-hidden="true"></div>
<script src="/i18n.js?v=7" defer></script>
<script src="/i18n/auth.js" defer></script>
<script src="/theme-toggle.js?v=1" defer></script>
</body>
</html>
