<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nammerha — Sign In</title>
  <meta name="description" content="Sign in to Nammerha — the OCDS-compliant reconstruction platform rebuilding Syria with transparency." />
  <link rel="stylesheet" href="/fonts/phosphor/phosphor.css" />
  <script type="module" src="/src/pages/auth.ts"></script>
  <link href="/i18n.css?v=5" rel="stylesheet"/>
</head>
<body class="bg-cloud-white font-display text-slate-900 antialiased">
  <div class="mobile-container flex flex-col relative min-h-screen">

    <!-- Brand Header -->
    <header class="px-6 pt-12 pb-6 text-center relative z-10">
      <img src="/brand/Nammerha_logo_Full.svg" alt="Nammerha — نعمّرها" class="h-28 w-auto mx-auto mb-2" />
      <p class="text-sm text-slate-500 mt-1" data-i18n="auth_subtitle">Rebuild Syria Together</p>
    </header>

    <!-- Tab Switcher -->
    <div class="px-6 mb-6 relative z-10">
      <div class="flex bg-slate-200/60 rounded-full p-1">
        <button id="tab-login" class="auth-tab auth-tab-active flex-1 py-2.5 rounded-full text-sm font-bold transition-all" data-i18n="sign_in">Sign In</button>
        <button id="tab-register" class="auth-tab flex-1 py-2.5 rounded-full text-sm font-bold transition-all text-slate-500" data-i18n="create_account">Create Account</button>
      </div>
    </div>

    <!-- Error/Success Banner -->
    <div class="px-6 mb-4 relative z-10" id="auth-banner" style="display:none">
      <div class="rounded-xl p-3 text-sm font-medium flex items-center gap-2" id="auth-banner-inner">
        <i class="ph" id="auth-banner-icon" aria-hidden="true"></i>
        <span id="auth-banner-text"></span>
      </div>
    </div>

    <!-- LOGIN FORM -->
    <form id="form-login" class="px-6 flex flex-col gap-4 relative z-10" novalidate>
      <!-- Email -->
      <div>
        <label for="login-email" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="email_label">Email Address</label>
        <div class="relative">
          <i class="ph ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <input id="login-email" name="email" type="email" required autocomplete="email"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="you@example.com" />
        </div>
      </div>
      <!-- Password -->
      <div>
        <label for="login-password" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="password_label">Password</label>
        <div class="relative">
          <i class="ph ph-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <input id="login-password" name="password" type="password" required autocomplete="current-password" minlength="8"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 pl-12 pr-12 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="••••••••" />
          <button type="button" id="login-toggle-pw" class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-slate-600" aria-label="Toggle password visibility">
            <i class="ph ph-eye" style="font-size:20px" aria-hidden="true"></i>
          </button>
        </div>
      </div>
      <!-- Submit -->
      <button type="submit" id="login-submit" class="btn-primary mt-2">
        <i class="ph ph-sign-in" aria-hidden="true"></i>
        <span id="login-submit-text" data-i18n="sign_in_btn">Sign In</span>
      </button>
      <!-- PLT-AUD-002: Forgot Password Link -->
      <div class="text-center mt-3">
        <button type="button" id="forgot-password-btn" class="text-sm text-trust-blue font-medium hover:underline" data-i18n="forgot_password">Forgot your password?</button>
      </div>
    </form>

    <!-- REGISTER FORM (hidden by default) -->
    <form id="form-register" class="px-6 flex flex-col gap-4 relative z-10" novalidate style="display:none">
      <!-- Full Name -->
      <div>
        <label for="reg-name" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="full_name_label">Full Name</label>
        <div class="relative">
          <i class="ph ph-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <input id="reg-name" name="full_name" type="text" required autocomplete="name"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="Full Name" />
        </div>
      </div>
      <!-- Email -->
      <div>
        <label for="reg-email" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="email_label">Email Address</label>
        <div class="relative">
          <i class="ph ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <input id="reg-email" name="email" type="email" required autocomplete="email"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="you@example.com" />
        </div>
      </div>
      <!-- Password -->
      <div>
        <label for="reg-password" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="password_label">Password</label>
        <div class="relative">
          <i class="ph ph-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <input id="reg-password" name="password" type="password" required autocomplete="new-password" minlength="8"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 pl-12 pr-12 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="Min 8 chars, 1 uppercase, 1 number" />
          <button type="button" id="reg-toggle-pw" class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-slate-600" aria-label="Toggle password visibility">
            <i class="ph ph-eye" style="font-size:20px" aria-hidden="true"></i>
          </button>
        </div>
        <!-- Password Strength -->
        <div class="mt-2 flex gap-1" id="pw-strength-bars">
          <div class="h-1 flex-1 rounded-full bg-slate-200"></div>
          <div class="h-1 flex-1 rounded-full bg-slate-200"></div>
          <div class="h-1 flex-1 rounded-full bg-slate-200"></div>
          <div class="h-1 flex-1 rounded-full bg-slate-200"></div>
        </div>
        <p class="text-[10px] text-slate-400 mt-1" id="pw-strength-label" data-i18n="pw_requirements">8+ chars, 1 uppercase, 1 number</p>
      </div>
      <!-- Role Selection -->
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="your_role">Your Role</label>
        <div class="grid grid-cols-2 gap-3" id="role-grid">
          <button type="button" class="role-card glass-card p-3 rounded-xl flex flex-col items-center text-center gap-1.5 transition-all" data-role="homeowner">
            <div class="size-10 bg-trust-blue/10 rounded-lg flex items-center justify-center">
              <i class="ph ph-house text-trust-blue" aria-hidden="true"></i>
            </div>
            <span class="text-[11px] font-bold text-slate-700" data-i18n="role_homeowner">Homeowner</span>
          </button>
          <button type="button" class="role-card glass-card p-3 rounded-xl flex flex-col items-center text-center gap-1.5 transition-all" data-role="donor">
            <div class="size-10 bg-warm-earth/10 rounded-lg flex items-center justify-center">
              <i class="ph ph-hand-heart text-warm-earth" aria-hidden="true"></i>
            </div>
            <span class="text-[11px] font-bold text-slate-700" data-i18n="role_donor">Donor</span>
          </button>
          <button type="button" class="role-card glass-card p-3 rounded-xl flex flex-col items-center text-center gap-1.5 transition-all" data-role="engineer">
            <div class="size-10 bg-smoky-jade/10 rounded-lg flex items-center justify-center">
              <i class="ph ph-hard-hat text-smoky-jade" aria-hidden="true"></i>
            </div>
            <span class="text-[11px] font-bold text-slate-700" data-i18n="role_engineer">Engineer</span>
          </button>
          <button type="button" class="role-card glass-card p-3 rounded-xl flex flex-col items-center text-center gap-1.5 transition-all" data-role="supplier">
            <div class="size-10 bg-warning-yellow/10 rounded-lg flex items-center justify-center">
              <i class="ph ph-truck text-warning-yellow" aria-hidden="true"></i>
            </div>
            <span class="text-[11px] font-bold text-slate-700" data-i18n="role_supplier">Supplier</span>
          </button>
          <!-- PLT-AUD-003 FIX: Contractor and Tradesperson role cards -->
          <button type="button" class="role-card glass-card p-3 rounded-xl flex flex-col items-center text-center gap-1.5 transition-all" data-role="contractor">
            <div class="size-10 bg-trust-blue/10 rounded-lg flex items-center justify-center">
              <i class="ph ph-buildings text-trust-blue" aria-hidden="true"></i>
            </div>
            <span class="text-[11px] font-bold text-slate-700" data-i18n="role_contractor">Contractor</span>
          </button>
          <button type="button" class="role-card glass-card p-3 rounded-xl flex flex-col items-center text-center gap-1.5 transition-all" data-role="tradesperson">
            <div class="size-10 bg-smoky-jade/10 rounded-lg flex items-center justify-center">
              <i class="ph ph-wrench text-smoky-jade" aria-hidden="true"></i>
            </div>
            <span class="text-[11px] font-bold text-slate-700" data-i18n="role_tradesperson">Tradesperson</span>
          </button>
        </div>
      </div>
      <!-- Submit -->
      <button type="submit" id="reg-submit" class="btn-primary mt-2" disabled>
        <i class="ph ph-user-plus" aria-hidden="true"></i>
        <span id="reg-submit-text" data-i18n="create_account_btn">Create Account</span>
      </button>
    </form>

    <!-- Trust Footer -->
    <div class="mt-auto px-6 py-8 text-center relative z-10">
      <div class="flex items-center justify-center gap-4 mb-3">
        <div class="flex items-center gap-1 text-[10px] text-slate-400 font-medium">
          <i class="ph ph-shield-check text-smoky-jade" style="font-size:14px" aria-hidden="true"></i>
          <span data-i18n="auth_trust_1">OCDS Verified</span>
        </div>
        <div class="flex items-center gap-1 text-[10px] text-slate-400 font-medium">
          <i class="ph ph-lock text-trust-blue" style="font-size:14px" aria-hidden="true"></i>
          <span data-i18n="auth_trust_2">256-bit Encrypted</span>
        </div>
      </div>
      <p class="text-[10px] text-slate-400" data-i18n="auth_footer">By continuing, you agree to our Terms of Service and Privacy Policy.</p>
    </div>

  </div>

  <!-- Decorative Gradient Orbs -->
  <div class="gradient-orb gradient-orb-primary" style="width:200px;height:200px;top:-60px;right:-60px"></div>
  <div class="gradient-orb gradient-orb-jade" style="width:250px;height:250px;top:50%;left:-80px"></div>
<script src="/i18n.js?v=5" defer></script>
</body>
</html>
