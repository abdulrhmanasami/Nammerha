<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <script src="/theme-boot.js"></script>
  <link rel="icon" type="image/svg+xml" href="/brand/Nammerha_logo_icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- P0-MOB-001 FIX: PWA installability -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#242424" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#F4F6F8" media="(prefers-color-scheme: light)">
  <title>Nammerha — Profile</title>
  <meta name="description" content="Manage your Nammerha account settings, KYC verification, and notification preferences." />
  <link rel="stylesheet" href="/fonts/phosphor/phosphor.css" />
  <meta property="og:title" content="Profile — Nammerha" />
  <meta property="og:description" content="Manage your Nammerha account settings, KYC verification, and notification preferences." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/brand/Nammerha_logo_icon.svg" />
  <meta name="twitter:card" content="summary" />
  <script type="module" src="/src/pages/profile.ts"></script>
  <script type="module" src="/src/components/role-switcher.ts"></script>
  <link href="/i18n.css?v=7" rel="stylesheet"/>
</head>
<body class="bg-cloud-white font-display text-slate-900 antialiased">
<!-- P0-A1 FIX: Skip-to-content link (WCAG 2.4.1) -->
<a href="#main-content" class="skip-link" data-i18n="skip_to_content">Skip to content</a>
<main id="main-content" class="mobile-container min-h-screen flex flex-col pb-28">

  <!-- Header -->
  <header class="glass-nav sticky top-0 z-50">
    <div class="flex items-center justify-between px-4 h-16 max-w-md mx-auto">
      <!-- P1-MOB-001 FIX: Removed inline onclick — wired in profile.ts via data-back-btn -->
      <a href="index.html" data-back-btn class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-trust-blue/5 transition-colors" aria-label="Go back" data-i18n-aria="aria_go_back">
        <i class="ph ph-arrow-left text-slate-700" aria-hidden="true"></i>
      </a>
      <h1 class="text-lg font-bold tracking-tight" data-i18n="profile_title">Profile</h1>
      <!-- P2-F8: Removed duplicate logout icon. Bottom #logout-action button has text label. -->
      <div class="w-11 h-11"></div>
    </div>
  </header>

  <!-- Profile Card -->
  <section class="px-4 pt-6 animate-fade-in-up">
    <div class="glass-card rounded-2xl p-6 flex flex-col items-center text-center">
      <div class="size-20 bg-trust-blue rounded-full flex items-center justify-center mb-3">
        <i class="ph ph-user text-white" style="font-size:36px" aria-hidden="true"></i>
      </div>
      <h2 id="user-name" class="text-xl font-bold">—</h2>
      <p id="user-email" class="text-sm text-slate-500 mt-0.5">—</p>
      <div class="flex items-center gap-2 mt-3">
        <span id="user-role" class="badge-primary">—</span>
        <span id="kyc-status" class="badge-verified">
          <i class="ph ph-shield-check ph-xs" aria-hidden="true"></i>
          <span data-i18n="kyc_pending">Pending KYC</span>
        </span>
      </div>
      <!-- Profile Completion Progress -->
      <div class="w-full mt-4" id="profile-completion-container">
        <div class="flex items-center justify-between mb-1">
          <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider" data-i18n="profile_completion">Profile Completion</span>
          <span id="profile-completion-pct" class="text-xs font-black text-trust-blue">0%</span>
        </div>
        <div class="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
          <div id="profile-completion-bar" class="h-full bg-gradient-to-r from-trust-blue to-smoky-jade rounded-full transition-all duration-700" style="width:0%"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- My Roles Section -->
  <section class="px-4 pt-6 animate-fade-in-up" style="animation-delay:0.1s">
    <h3 class="text-sm font-bold uppercase tracking-wider text-slate-900 mb-3" data-i18n="my_roles">My Roles</h3>
    <div id="roles-list" class="flex flex-col gap-2">
      <!-- Roles rendered dynamically by profile.ts -->
      <div class="bg-white rounded-xl p-4 flex items-center justify-center shadow-sm border border-slate-100">
        <i class="ph ph-spinner-gap ph-spin text-slate-300" style="font-size:20px" aria-hidden="true"></i>
      </div>
    </div>
    <!-- Add New Role Button -->
    <button id="add-role-btn" class="w-full mt-3 py-3 text-sm font-bold text-trust-blue bg-trust-blue/5 rounded-xl border border-trust-blue/10 hover:bg-trust-blue/10 transition-colors flex items-center justify-center gap-2">
      <i class="ph ph-plus-circle" style="font-size:18px" aria-hidden="true"></i>
      <span data-i18n="add_new_role">Activate a New Role</span>
    </button>
    <!-- Role Activation Modal (hidden by default) -->
    <div id="role-activation-modal" class="hidden mt-3">
      <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-lg">
        <h4 class="text-sm font-bold mb-3" data-i18n="choose_role_to_activate">Choose a role to activate</h4>
        <div id="available-roles-grid" class="grid grid-cols-2 gap-2">
          <!-- Available roles rendered dynamically -->
        </div>
        <button id="cancel-role-activation" class="w-full mt-3 py-2 text-xs font-medium text-slate-500 hover:text-slate-700 transition-colors" data-i18n="cancel">Cancel</button>
      </div>
    </div>
  </section>

  <!-- Settings Menu -->
  <section class="px-4 pt-6">
    <h3 class="text-sm font-bold uppercase tracking-wider text-slate-900 mb-3" data-i18n="settings">Settings</h3>
    <div class="flex flex-col gap-2">
      <!-- Notifications -->
      <div class="bg-white rounded-xl p-4 flex items-center gap-4 shadow-sm border border-slate-100">
        <div class="size-10 bg-smoky-jade/10 rounded-lg flex items-center justify-center shrink-0">
          <i class="ph ph-bell text-smoky-jade" aria-hidden="true"></i>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-bold" data-i18n="notification_setting">Notifications</p>
          <p class="text-[10px] text-slate-400" data-i18n="notification_desc">Push and email alerts</p>
        </div>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" id="notif-toggle" class="sr-only peer" checked>
          <!-- P2-RTL-001 FIX: Uses logical after:start-0.5 and RTL-aware translate direction -->
          <div class="w-9 h-5 bg-slate-300 peer-checked:bg-smoky-jade rounded-full transition-colors after:content-[''] after:absolute after:top-0.5 after:start-0.5 after:bg-white after:rounded-full after:size-4 after:transition-transform peer-checked:after:translate-x-4 rtl:peer-checked:after:-translate-x-4"></div>
        </label>
      </div>
      <!-- KYC Verification -->
      <div class="bg-white rounded-xl p-4 flex items-center gap-4 shadow-sm border border-slate-100">
        <div class="size-10 bg-warm-earth/10 rounded-lg flex items-center justify-center shrink-0">
          <i class="ph ph-identification-card text-warm-earth" aria-hidden="true"></i>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-bold" data-i18n="kyc_verification">KYC Verification</p>
          <p id="kyc-detail" class="text-[10px] text-slate-400" data-i18n="kyc_detail">Verify your identity</p>
        </div>
        <i id="kyc-status-icon" class="ph ph-clock text-slate-400" aria-hidden="true"></i>
      </div>
      <a href="about.html" class="bg-white rounded-xl p-4 flex items-center gap-4 shadow-sm border border-slate-100 hover:bg-slate-50 transition-colors">
        <div class="size-10 bg-slate-100 rounded-lg flex items-center justify-center shrink-0">
          <i class="ph ph-info text-slate-500" aria-hidden="true"></i>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-bold" data-i18n="about_nammerha">About Nammerha</p>
          <p class="text-[10px] text-slate-400">v1.0.0 — <span data-i18n="ocds_certified">OCDS Certified</span></p>
        </div>
        <i class="ph ph-caret-right text-slate-400" aria-hidden="true"></i>
      </a>
    </div>
  </section>

  <!-- Danger Zone -->
  <section class="px-4 pt-8 mt-auto">
    <button id="logout-action" class="w-full py-3 text-sm font-bold text-red-500 bg-red-50 rounded-xl border border-red-100 hover:bg-red-100 transition-colors">
      <i class="ph ph-sign-out" style="font-size:16px" aria-hidden="true"></i>
      <span data-i18n="sign_out">Sign Out</span>
    </button>
  </section>

</main>

<script src="/i18n.js?v=7" defer></script>
<script src="/nav.js?v=7" defer></script>
</body>
</html>
