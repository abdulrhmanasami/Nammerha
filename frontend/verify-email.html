<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <!-- FRC-006 FIX: Pre-paint FOUC guard — hidden until theme-boot.js sets data-theme -->
  <style>@keyframes _f{to{visibility:visible}}html:not([data-theme]){visibility:hidden;animation:_f 0s 1.5s forwards}</style>
  <script src="/theme-boot.js"></script>
  <link rel="icon" type="image/svg+xml" href="/brand/Nammerha_logo_icon.svg" />
  <link rel="apple-touch-icon" sizes="192x192" href="/brand/icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- CONF-P01 FIX: Enforceable CSP directives -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https:; font-src 'self'; object-src 'none'; base-uri 'self'" />
  <!-- P0-MOB-001 FIX: PWA installability -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#242424" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#F4F6F8" media="(prefers-color-scheme: light)">
  <title>Nammerha — Email Verification | تأكيد البريد</title>
  <meta name="description" content="Verify your Nammerha account email address." />
  <!-- DEF-013 FIX: Prevent search engine indexing of authenticated pages.
       Standard: SEO Best Practice — authenticated content must not be indexed. -->
  <meta name="robots" content="noindex, nofollow" />
  <meta property="og:title" content="Nammerha — Email Verification | تأكيد البريد" />
  <meta property="og:description" content="Verify your Nammerha account email address." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://nammerha.com/brand/og-default.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Nammerha — Email Verification | تأكيد البريد" />
  <link rel="preload" href="/fonts/ibm-plex-sans-arabic.css" as="style" />
  <link rel="stylesheet" href="/fonts/phosphor/phosphor.css" />
  <script type="module" src="/src/pages/verify-email.ts"></script>
  <link href="/i18n.css?v=7" rel="stylesheet"/>
</head>
<body class="bg-cloud-white font-display text-slate-900 antialiased">
<!-- PE-001 FIX: Noscript fallback -->
<noscript>
  <style>html:not([data-theme]){visibility:visible!important}</style>
  <div class="nm-noscript">
    <p class="nm-noscript-title">نعمّرها تحتاج JavaScript</p>
    <p class="nm-noscript-desc">Nammerha requires JavaScript. Please enable it in your browser settings.</p>
  </div>
</noscript>
<!-- P0-A1 FIX: Skip-to-content link (WCAG 2.4.1) -->
<a href="#main-content" class="skip-link" data-i18n="skip_to_content">Skip to content</a>
  <!-- PLAT-M06 FIX: Changed <div> to <main> for WCAG landmark semantics.
       Previous: <div id="main-content"> — screen readers didn't announce main region.
       Standard: HTML5 §4.4.1, parity with reset-password.html and auth.html. -->
  <main id="main-content" class="mobile-container flex flex-col relative min-h-screen pb-24">

    <!-- Brand Header -->
    <header class="px-6 pt-12 pb-6 text-center relative z-10">
      <div class="inline-flex items-center justify-center size-16 bg-smoky-jade rounded-2xl shadow-lg shadow-smoky-jade/20 mb-4" id="verify-icon-container">
        <i class="ph ph-spinner-gap text-white animate-spin nm-icon-32" aria-hidden="true" id="verify-icon"></i>
      </div>
      <h1 class="text-2xl font-bold tracking-tight" id="verify-title" data-i18n="verify_email_title">Verifying Email…</h1>
      <p class="text-sm text-slate-500 mt-1" id="verify-subtitle" data-i18n="verify_email_subtitle">Please wait while we verify your email address</p>
      <!-- PLAT-M06 FIX: Language switcher mount — parity with reset-password.html -->
      <div id="nm-lang-mount" class="flex justify-center mt-3"></div>
    </header>
    <!-- PLAT-M06 FIX: Theme toggle button — parity with auth.html and reset-password.html -->
    <!-- DEF-THEME-001 FIX: Replaced inline positioning with CSS class.
         Standard: P1-001 CSS Single Source of Truth. -->
    <button type="button" id="nm-theme-toggle" data-nm-theme-toggle class="nm-theme-toggle-pos fixed z-50 w-9 h-9 rounded-full border border-slate-200 bg-white/90 backdrop-blur flex items-center justify-center cursor-pointer shadow-sm transition-all touch-safe" aria-label="Toggle theme" data-i18n-aria="aria_toggle_theme">
      <i id="nm-theme-toggle-icon" class="text-lg" data-nm-theme-icon aria-hidden="true"></i>
    </button>

    <!-- PLAT-M06 FIX: Added role="alert" and aria-live for screen reader announcements.
         Standard: WCAG 4.1.3 (Status Messages), parity with auth.html/reset-password.html. -->
    <!-- DEF-VIS-002 FIX: Replaced style="display:none" with class="hidden".
         Standard: DEF-VIS-001 precedent, CSS Single Source of Truth. -->
    <div class="px-6 mb-4 relative z-10 hidden" id="verify-banner" role="alert" aria-live="assertive">
      <div class="rounded-xl p-4 text-sm font-medium flex items-start gap-3" id="verify-banner-inner">
        <i class="ph mt-0.5 text-xl" id="verify-banner-icon" aria-hidden="true"></i>
        <div>
          <p class="font-bold" id="verify-banner-title"></p>
          <p class="mt-1 opacity-80" id="verify-banner-text"></p>
        </div>
      </div>
    </div>

    <!-- Action Buttons (shown after verification) -->
    <!-- DEF-VIS-003 FIX: style="display:none" → class="hidden" -->
    <div class="px-6 relative z-10 hidden" id="verify-actions">
      <a href="/auth.html" class="btn-primary w-full flex items-center justify-center gap-2" id="verify-action-btn">
        <i class="ph ph-sign-in" aria-hidden="true"></i>
        <span data-i18n="sign_in_btn">Sign In</span>
      </a>

      <!-- FIX-07: Resend verification email — shown when token expires -->
      <!-- DEF-VIS-003 FIX: style="display:none" → class="hidden" -->
      <div id="verify-resend" class="mt-4 hidden">
        <p class="text-xs text-slate-500 mb-2 text-center" data-i18n="verify_resend_label">Need a new verification link?</p>
        <div class="flex gap-2">
          <!-- DEF-VERIFY-001 FIX: Added enterkeyhint, inputmode, autocomplete for mobile keyboard.
               Standard: Apple HIG (Keyboard), WCAG 1.3.5 (Input Purpose). -->
          <!-- DEF-UX-003 FIX: Migrated from ad-hoc Tailwind to canonical nm-input class.
               Previous: rounded-xl border border-slate-200 px-4 py-3 text-sm — 5 classes duplicating nm-input.
               Standard: Design System Governance, DRY Principle. -->
          <input type="email" id="verify-resend-email" inputmode="email" autocomplete="email" enterkeyhint="send" placeholder="your@email.com"
                 class="nm-input flex-1" dir="ltr" />
          <!-- DEF-UX-001 FIX: Replaced ghost btn-outline (zero CSS definitions) with btn-secondary.
               Previous: btn-outline had NO CSS rules — button rendered unstyled.
               Standard: Design System Component Governance. -->
          <button type="button" id="verify-resend-btn" class="btn-secondary nm-btn-compact flex items-center gap-1 whitespace-nowrap">
            <i class="ph ph-envelope" aria-hidden="true"></i>
            <span data-i18n="verify_resend_btn">Resend</span>
          </button>
        </div>
        <!-- DEF-VIS-003 FIX: style="display:none" → class="hidden" -->
        <div id="verify-resend-feedback" class="mt-2 hidden"></div>
      </div>
    </div>

    <!-- PLAT-M06 FIX: Trust Footer — converted to progressive disclosure.
         Previous: badges shown inline. Now matches auth.html/reset-password.html pattern.
         Standard: Nielsen #8 (Aesthetic and minimalist design). -->
    <div class="mt-auto px-6 py-8 text-center relative z-10">
      <details class="mb-3">
        <summary class="text-3xs text-slate-400 font-bold uppercase tracking-wider cursor-pointer hover:text-trust-blue transition-colors inline-flex items-center gap-1">
          <i class="ph ph-shield-check text-xs" aria-hidden="true"></i>
          <span data-i18n="auth_security_details">Security Details</span>
        </summary>
        <div class="flex items-center justify-center gap-4 mt-2 animate-fade-in-up">
          <div class="flex items-center gap-1 text-3xs text-slate-400 font-medium">
            <i class="ph ph-shield-check text-smoky-jade text-sm" aria-hidden="true"></i>
            <span data-i18n="auth_trust_1">OCDS Verified</span>
          </div>
          <div class="flex items-center gap-1 text-3xs text-slate-400 font-medium">
            <i class="ph ph-lock text-trust-blue text-sm" aria-hidden="true"></i>
            <span data-i18n="auth_trust_2">256-bit Encrypted</span>
          </div>
        </div>
      </details>
    </div>

  </main>

  <!-- PLAT-M06 FIX: Gradient orbs — replaced inline styles with standardized CSS classes.
       Previous: style="width:200px;height:200px;top:-60px;right:-60px" — broke in RTL.
       Standard: CSS Logical Properties, Design System Visual Cohesion. -->
  <div class="gradient-orb gradient-orb-primary gradient-orb-pos-end" aria-hidden="true"></div>
  <div class="gradient-orb gradient-orb-jade gradient-orb-pos-start" aria-hidden="true"></div>
<!-- LEG-001 FIX: Legal footer — Terms, Privacy, Refund links (Platinum Standard) -->
<footer class="nm-legal-footer">
  <nav aria-label="Legal navigation">
    <a href="/terms.html" data-i18n="footer_terms">Terms</a>
    <a href="/privacy.html" data-i18n="footer_privacy">Privacy</a>
    <a href="/refund-policy.html" data-i18n="footer_refund">Refund Policy</a>
  </nav>
  <p class="nm-copyright" data-i18n="footer_copyright">© 2026 Nammerha. All rights reserved.</p>
</footer>

<script src="/i18n.js?v=7" defer></script>
<script src="/i18n/auth.js" defer></script>
<!-- PLAT-M06 FIX: Added load-guard.js, theme-toggle.js, nav.js — were missing.
     Standard: Progressive Enhancement, consistency with all other pages. -->
<script src="/load-guard.js" defer></script>
<script src="/theme-toggle.js?v=2" defer></script>
<script src="/nav.js?v=7" defer></script>
</body>
</html>
