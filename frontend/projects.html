<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <!-- FRC-006 FIX: Pre-paint FOUC guard — hidden until theme-boot.js sets data-theme -->
  <style>html:not([data-theme]){visibility:hidden}</style>
  <script src="/theme-boot.js"></script>
  <link rel="icon" type="image/svg+xml" href="/brand/Nammerha_logo_icon.svg" />
  <link rel="apple-touch-icon" sizes="192x192" href="/brand/icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- CONF-P01 FIX: Enforceable CSP directives -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https:; font-src 'self'; object-src 'none'; base-uri 'self'" />
  <!-- P0-MOB-001 FIX: PWA installability -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#242424" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#F4F6F8" media="(prefers-color-scheme: light)">
  <title>Nammerha — Projects | المشاريع</title>
  <meta name="description" content="Browse reconstruction projects across Syria. Fund materials directly and track your impact transparently." />
  <!-- GAP-010: OG/Twitter meta -->
  <meta property="og:title" content="Browse Projects — Nammerha" />
  <meta property="og:description" content="Explore Syrian reconstruction projects. Fund materials directly and track your impact transparently." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://nammerha.com/brand/icon-512.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Nammerha — Projects | المشاريع" />
  <link rel="preload" href="/fonts/ibm-plex-sans-arabic.css" as="style" />
  <link rel="stylesheet" href="/fonts/phosphor/phosphor.css" />
  <script type="module" src="/src/pages/projects.ts"></script>
  <link href="/i18n.css?v=7" rel="stylesheet"/>
</head>
<body class="bg-cloud-white font-display text-slate-900 min-h-screen flex flex-col antialiased">
<!-- GAP-X07 FIX: Noscript fallback — overrides FOUC guard when JS is disabled/fails.
     Without this, html:not([data-theme]){visibility:hidden} makes page permanently invisible.
     Standard: Progressive Enhancement — "Content must be accessible without JavaScript." -->
<noscript>
  <style>html:not([data-theme]){visibility:visible!important}</style>
  <div style="padding:2rem;text-align:center;font-family:system-ui;direction:rtl;">
    <p style="font-size:1.25rem;font-weight:700;">نعمّرها تحتاج JavaScript</p>
    <p style="margin-top:0.5rem;color:#64748b;">Nammerha requires JavaScript. Please enable it in your browser settings.</p>
  </div>
</noscript>
<!-- P0-A1 FIX: Skip-to-content link (WCAG 2.4.1) -->
<a href="#main-content" class="skip-link" data-i18n="skip_to_content">Skip to content</a>
<div class="mobile-container min-h-screen flex flex-col">

  <!-- INC-NEW-01 FIX: Unified .page-header component.
       Previous: glass-nav sticky + inner div.px-4.h-14.mobile-container.
       Now: Flat .page-header — single source of truth. Back button wired by page-header.ts.
       Standard: Nielsen #4 (Consistency), Apple HIG (Navigation Bar Standard). -->
  <!-- CON-002 FIX: Removed redundant border-b border-slate-200. .page-header owns the border. -->
  <header class="page-header">
      <a href="index.html" data-back-btn class="flex w-11 h-11 shrink-0 items-center justify-center rounded-full hover:bg-slate-200/50 transition-colors" aria-label="Go back" data-i18n-aria="aria_go_back">
        <i class="ph ph-arrow-left" aria-hidden="true"></i>
      </a>
      <h1 class="text-lg font-bold tracking-tight flex-1 text-center page-header-title" data-i18n="projects_title">Projects</h1>
      <div class="w-11 h-11 shrink-0"></div>
  </header>

  <!-- INC-NEW-03 FIX: Filter bar moved inside <main> so keyboard skip-link doesn't bypass it.
       Previous: Skip-link targeted #main-content (L90) but filter bar (search, pills, sort)
       was outside <main> — keyboard users skipped past ALL filtering controls.
       Standard: WCAG 2.4.1 (Bypass Blocks), Apple HIG (Keyboard Navigation). -->
  <!-- Projects Grid + Filters -->
  <main id="main-content" class="flex-1 px-4 pb-24">

  <!-- Filter Bar -->
  <div class="pt-4 pb-2 flex flex-col gap-3">
    <!-- Search -->
    <div class="relative">
      <i class="ph ph-magnifying-glass absolute start-3 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
      <!-- FRC-P08 FIX: enterkeyhint for mobile keyboard -->
      <input type="search" id="project-search" enterkeyhint="search" class="w-full ps-10 pe-4 py-2.5 rounded-xl bg-white border border-slate-200 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-trust-blue/30" placeholder="Search projects..." data-i18n-placeholder="projects_search_placeholder" />
    </div>
    <!-- Filter pills -->
    <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-hidden" id="filter-pills">
      <button class="filter-pill filter-pill-active shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full border transition-colors" data-filter="all" data-i18n="projects_filter_all">All</button>
      <button class="filter-pill shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors" data-filter="structural" data-i18n="projects_filter_structural">Structural</button>
      <button class="filter-pill shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors" data-filter="plumbing" data-i18n="projects_filter_plumbing">Plumbing</button>
      <button class="filter-pill shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors" data-filter="electrical" data-i18n="projects_filter_electrical">Electrical</button>
      <button class="filter-pill shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors" data-filter="mixed" data-i18n="projects_filter_mixed">Mixed</button>
    </div>
    <!-- Sort & count -->
    <!-- Sort & count -->
    <!-- GAP-NEW-07 FIX: Added structured pagination context (showing X of Y).
         Previous: just "Loading..." with no total count indicator.
         Standard: Nielsen #1 (Visibility), Infinite Scroll Best Practices. -->
    <div class="flex items-center justify-between">
      <!-- GAP-2026-B06 FIX: Added aria-live="polite" + role="status" for screen reader announcements.
           Previous: #project-count updated dynamically but had no ARIA live region —
           screen reader users received no announcement when filter/sort changed results.
           Standard: WCAG 4.1.3 (Status Messages), WCAG 1.3.1 (Info and Relationships). -->
      <span class="text-xs text-slate-400" id="project-count" role="status" aria-live="polite" data-i18n="projects_loading">Loading...</span>
      <select id="project-sort" class="text-xs bg-transparent text-slate-500 font-medium border-none focus:outline-none cursor-pointer">
        <option value="funded_percentage" data-i18n="projects_sort_funding">Most Funded</option>
        <option value="published_at" data-i18n="projects_sort_newest">Newest</option>
      </select>
    </div>
  </div>

  <!-- Projects Grid -->
    <!-- Loading skeleton -->
    <div id="projects-skeleton" class="flex flex-col gap-4">
      <div class="bg-white rounded-xl p-4 h-48 animate-pulse border border-slate-100"></div>
      <div class="bg-white rounded-xl p-4 h-48 animate-pulse border border-slate-100"></div>
      <div class="bg-white rounded-xl p-4 h-48 animate-pulse border border-slate-100"></div>
    </div>
    <!-- Project cards rendered here -->
    <!-- FRC-A01 FIX: animate-fade-in-up for smooth skeleton→content transition -->
    <div id="projects-grid" class="flex flex-col gap-4 hidden animate-fade-in-up"></div>
    <!-- Empty state -->
    <div id="projects-empty" class="text-center py-16 hidden">
      <div class="size-16 rounded-full bg-warm-earth/10 flex items-center justify-center mx-auto mb-4">
        <i class="ph ph-buildings text-warm-earth" style="font-size:32px" aria-hidden="true"></i>
      </div>
      <h2 class="text-sm font-bold text-slate-700 mb-1" data-i18n="projects_empty_title">No projects found</h2>
      <p class="text-xs text-slate-400 max-w-xs mx-auto" data-i18n="projects_empty_desc">Try adjusting your filters or check back later for new reconstruction projects.</p>
    </div>
    <!-- Error state -->
    <div id="projects-error" class="text-center py-16 hidden">
      <div class="size-16 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-4">
        <i class="ph ph-warning-circle text-red-400" style="font-size:32px" aria-hidden="true"></i>
      </div>
      <h2 class="text-sm font-bold text-slate-700 mb-1" data-i18n="projects_error_title">Could not load projects</h2>
      <p class="text-xs text-slate-400 max-w-xs mx-auto mb-4" data-i18n="projects_error_desc">Please check your connection and try again.</p>
      <button id="projects-retry" class="text-xs font-semibold bg-trust-blue text-white px-4 py-2 rounded-lg hover:bg-trust-blue/90 transition-colors inline-flex items-center gap-2">
        <i class="ph ph-arrow-clockwise" aria-hidden="true"></i>
        <span data-i18n="projects_retry">Retry</span>
      </button>
    </div>
    <!-- Load more -->
    <!-- GAP-NEW-07 FIX: Added visible progress indicator above load-more button. -->
    <div id="load-more-container" class="text-center py-6 hidden">
      <p class="text-[10px] text-slate-400 mb-2" id="load-more-context"></p>
      <button id="load-more-btn" class="text-xs font-semibold text-trust-blue border border-trust-blue/30 px-6 py-2.5 rounded-lg hover:bg-trust-blue/5 transition-colors inline-flex items-center gap-2">
        <i class="ph ph-arrow-down" aria-hidden="true"></i>
        <span data-i18n="projects_load_more">Load More</span>
      </button>
    </div>

  </main>

</div>

  <!-- CONF-A02 FIX: Footer moved OUTSIDE <main> and mobile-container — WCAG 1.3.1 landmark semantics.
       Previous: footer was a child of <main>, violating HTML5 §4.4.2. -->
  <footer class="nm-legal-footer">
    <nav aria-label="Legal navigation">
      <a href="/terms.html" data-i18n="footer_terms">Terms</a>
      <a href="/privacy.html" data-i18n="footer_privacy">Privacy</a>
      <a href="/refund-policy.html" data-i18n="footer_refund">Refund Policy</a>
    </nav>
    <p class="nm-copyright" data-i18n="footer_copyright">© 2026 Nammerha. All rights reserved.</p>
  </footer>

  <!-- GAP-A03 FIX: Gradient orbs for visual design system cohesion.
       Was the only consumer page without decorative orbs (INC-N03 standard). -->
  <div class="gradient-orb gradient-orb-primary gradient-orb-pos-end" aria-hidden="true"></div>
  <div class="gradient-orb gradient-orb-jade gradient-orb-pos-start" aria-hidden="true"></div>

<script src="/i18n.js?v=7" defer></script>
<script src="/i18n/project.js" defer></script>
<!-- GAP-2601 FIX: Page Load Guard — detects TS module hydration failures and shows retry UI.
     Standard: Progressive Enhancement, Nielsen #1 (System Status Visibility). -->
<script src="/load-guard.js" defer></script>
<script src="/nav.js?v=7" defer></script>
</body>
</html>
