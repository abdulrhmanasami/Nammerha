<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />

    <style>
      @keyframes _f {
        to {
          visibility: visible;
        }
      }
      html:not([data-theme]) {
        visibility: hidden;
        animation: _f 0s 1.5s forwards;
      }
    </style>
    <script src="/theme-boot.js"></script>
    <link rel="icon" type="image/svg+xml" href="/brand/Nammerha_logo_icon.svg" />
    <link rel="apple-touch-icon" sizes="192x192" href="/brand/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#242424" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F4F6F8" media="(prefers-color-scheme: light)" />
    <title>نعمّرها — المشاريع | المشاريع</title>
    <meta
      name="description"
      content="Browse reconstruction projects across Syria. Fund materials directly and track your impact transparently."
    />

    <meta property="og:title" content="Browse Projects — Nammerha" />
    <meta
      property="og:description"
      content="Explore Syrian reconstruction projects. Fund materials directly and track your impact transparently."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://nammerha.com/brand/og-default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="نعمّرها — المشاريع | المشاريع" />

    <link
      rel="preload"
      href="/fonts/ibm-plex-sans-arabic.css"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript><link rel="stylesheet" href="/fonts/ibm-plex-sans-arabic.css" /></noscript>
    <link rel="stylesheet" href="/fonts/phosphor/phosphor.css" />
    <script type="module" src="/src/pages/projects.ts"></script>
    <link href="/i18n.css" rel="stylesheet" />
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body
    class="bg-cloud-white font-display text-slate-900 min-h-screen flex flex-col antialiased dark:bg-dark-surface dark:text-slate-100"
  >
    <noscript>
      <style>
        html:not([data-theme]) {
        }
      </style>
      <div class="nm-noscript">
        <p class="nm-noscript-title">نعمّرها تحتاج جافا سكريبت</p>
        <p class="nm-noscript-desc">نعمّرها تتطلّب تفعيل جافا سكريبت في إعدادات متصفحك.</p>
      </div>
    </noscript>

    <a href="#main-content" class="skip-link" data-i18n="skip_to_content">تخطي إلى المحتوى</a>
    <div class="mobile-container min-h-screen flex flex-col">
      <header class="page-header">
        <a
          href="index.html"
          data-back-btn
          class="flex w-11 h-11 shrink-0 items-center justify-center rounded-full hover:bg-slate-200/50 transition-colors"
          aria-label="Go back"
          data-i18n-aria="aria_go_back"
        >
          <i class="ph ph-arrow-left" aria-hidden="true"></i>
        </a>
        <h1
          class="text-lg font-bold tracking-tight flex-1 text-center page-header-title"
          data-i18n="projects_title"
        >
          المشاريع
        </h1>
        <div class="w-11 h-11 shrink-0"></div>
      </header>

      <main id="main-content" class="flex-1 px-4 pb-24">
        <div class="pt-4 pb-2 flex flex-col gap-3">
          <div class="relative">
            <i
              class="ph ph-magnifying-glass absolute start-3 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500"
              aria-hidden="true"
            ></i>

            <input
              type="search"
              id="project-search"
              enterkeyhint="search"
              class="w-full ps-10 pe-4 py-2.5 rounded-xl bg-white border border-slate-200 text-base placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-trust-blue/30 dark:bg-dark-surface dark:border-dark-border"
              placeholder="البحث عن المشاريع..."
              data-i18n-placeholder="projects_search_placeholder"
              dir="auto"
            />
          </div>

          <div
            class="flex gap-2 overflow-x-auto w-full max-w-full pb-1 scrollbar-hidden"
            id="filter-pills"
            role="radiogroup"
            aria-label="Project category filter"
          >
            <button
              type="button"
              class="filter-pill filter-pill-active shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full border transition-colors"
              data-filter="all"
              data-i18n="projects_filter_all"
              aria-pressed="true"
            >
              الكل
            </button>
            <button
              type="button"
              class="filter-pill shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors dark:border-dark-border dark:text-slate-400"
              data-filter="structural"
              data-i18n="projects_filter_structural"
              aria-pressed="false"
            >
              إنشائي
            </button>
            <button
              type="button"
              class="filter-pill shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors dark:border-dark-border dark:text-slate-400"
              data-filter="plumbing"
              data-i18n="projects_filter_plumbing"
              aria-pressed="false"
            >
              سباكة
            </button>
            <button
              type="button"
              class="filter-pill shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors dark:border-dark-border dark:text-slate-400"
              data-filter="electrical"
              data-i18n="projects_filter_electrical"
              aria-pressed="false"
            >
              كهربائي
            </button>
            <button
              type="button"
              class="filter-pill shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors dark:border-dark-border dark:text-slate-400"
              data-filter="mixed"
              data-i18n="projects_filter_mixed"
              aria-pressed="false"
            >
              مختلط
            </button>
          </div>

          <div class="flex items-center justify-between">
            <span
              class="text-xs text-slate-400 dark:text-slate-500"
              id="project-count"
              role="status"
              aria-live="polite"
              data-i18n="projects_loading"
              >جاري تحميل المشاريع...</span
            >
            <select
              id="project-sort"
              class="text-xs bg-transparent text-slate-500 font-medium border-none focus:outline-none cursor-pointer dark:text-slate-400"
            >
              <option value="funded_percentage" data-i18n="projects_sort_funding">
                نسبة التمويل
              </option>
              <option value="published_at" data-i18n="projects_sort_newest">الأحدث</option>
            </select>
          </div>
        </div>

        <div
          id="projects-skeleton"
          class="flex flex-col gap-4"
          aria-busy="true"
          role="status"
          aria-label="Loading projects"
        >
          <div
            class="bg-white rounded-xl p-4 h-48 animate-pulse border border-slate-100 dark:bg-dark-surface dark:border-dark-border"
            aria-hidden="true"
          ></div>
          <div
            class="bg-white rounded-xl p-4 h-48 animate-pulse border border-slate-100 dark:bg-dark-surface dark:border-dark-border"
            aria-hidden="true"
          ></div>
          <div
            class="bg-white rounded-xl p-4 h-48 animate-pulse border border-slate-100 dark:bg-dark-surface dark:border-dark-border"
            aria-hidden="true"
          ></div>
        </div>

        <div id="projects-grid" class="flex flex-col gap-4 nm-hidden animate-fade-in-up"></div>

        <div id="projects-empty" class="text-center py-16 nm-hidden">
          <div
            class="size-16 rounded-full bg-warm-earth/10 flex items-center justify-center mx-auto mb-4"
          >
            <i class="ph ph-buildings text-warm-earth nm-icon-32" aria-hidden="true"></i>
          </div>
          <h2
            class="text-sm font-bold text-slate-700 mb-1 dark:text-slate-300"
            data-i18n="projects_empty_title"
          >
            لا توجد مشاريع
          </h2>
          <p
            class="text-xs text-slate-400 max-w-xs mx-auto dark:text-slate-500"
            data-i18n="projects_empty_desc"
          >
            لا توجد مشاريع تطابق معايير البحث.
          </p>
        </div>

        <div id="projects-error" class="text-center py-16 nm-hidden">
          <div
            class="size-16 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-4 dark:bg-red-500/10"
          >
            <i class="ph ph-warning-circle text-red-400 nm-icon-32" aria-hidden="true"></i>
          </div>
          <h2
            class="text-sm font-bold text-slate-700 mb-1 dark:text-slate-300"
            data-i18n="projects_error_title"
          >
            خطأ في التحميل
          </h2>
          <p
            class="text-xs text-slate-400 max-w-xs mx-auto mb-4 dark:text-slate-500"
            data-i18n="projects_error_desc"
          >
            تعذر تحميل المشاريع. حاول مرة أخرى.
          </p>
          <button
            type="button"
            id="projects-retry"
            class="text-xs font-semibold bg-trust-blue text-white px-4 py-2 rounded-lg hover:bg-trust-blue/90 transition-colors inline-flex items-center gap-2"
          >
            <i class="ph ph-arrow-clockwise" aria-hidden="true"></i>
            <span data-i18n="projects_retry">إعادة المحاولة</span>
          </button>
        </div>

        <div id="load-more-container" class="text-center py-6 nm-hidden">
          <p class="text-3xs text-slate-400 mb-2 dark:text-slate-500" id="load-more-context"></p>
          <button
            type="button"
            id="load-more-btn"
            class="text-xs font-semibold text-trust-blue border border-trust-blue/30 px-6 py-2.5 rounded-lg hover:bg-trust-blue/5 transition-colors inline-flex items-center gap-2"
          >
            <i class="ph ph-arrow-down" aria-hidden="true"></i>
            <span data-i18n="projects_load_more">تحميل المزيد</span>
          </button>
        </div>
      </main>
    </div>

    <div class="gradient-orb gradient-orb-primary gradient-orb-pos-end" aria-hidden="true"></div>
    <div class="gradient-orb gradient-orb-jade gradient-orb-pos-start" aria-hidden="true"></div>

    <footer class="nm-legal-footer">
      <nav aria-label="Legal navigation">
        <a href="/terms.html" data-i18n="footer_terms">الشروط والأحكام</a>
        <a href="/privacy.html" data-i18n="footer_privacy">سياسة الخصوصية</a>
        <a href="/refund-policy.html" data-i18n="footer_refund">سياسة الاسترداد</a>
      </nav>
      <p class="nm-copyright" data-i18n="footer_copyright">© 2026 نعمِّرها. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="/i18n.js" defer></script>
    <script src="/i18n/common.js" defer></script>
    <script src="/i18n/project.js" defer></script>

    <script src="/nm-timers.js" defer></script>
    <script src="/load-guard.js" defer></script>
    <script src="/nav.js" defer></script>
  </body>
</html>
