# ── Nammerha Frontend — Docker Compose (Production)
# Isolated deployment on nammerha-net, port 8082 internal

services:
  nammerha-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nammerha-frontend
    restart: unless-stopped
    ports:
      - '127.0.0.1:8082:8080'
    networks:
      - nammerha-net
    labels:
      - 'com.nammerha.project=nammerha'
      - 'com.nammerha.component=frontend'
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=1001,gid=1001
      - /var/log/nginx:uid=1001,gid=1001
      - /var/run:uid=1001,gid=1001
      - /tmp:uid=1001,gid=1001
    security_opt:
      - no-new-privileges:true

networks:
  nammerha-net:
    driver: bridge
    name: nammerha-net
