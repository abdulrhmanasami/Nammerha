            descAr: 'تواصل معنا',
          },
        ];

        /* Find matching suggestions */
        var suggestions = null;
        for (var i = 0; i < ROUTE_HINTS.length; i++) {
          if (path.indexOf(ROUTE_HINTS[i].pattern) !== -1) {
            suggestions = ROUTE_HINTS[i].suggestions;
            break;
          }
        }
        if (!suggestions) suggestions = DEFAULT_SUGGESTIONS;

        /* Detect language */
        var isAr = (document.documentElement.lang || 'ar') === 'ar';

        /* Render links */
        var container = document.getElementById('nm-404-links');
        if (container) {
          var html = '';
          for (var j = 0; j < suggestions.length; j++) {
            var s = suggestions[j];
            html +=
              '<a href="' +
              s.href +
              '" class="suggestion-link" data-haptic="tap">' +
              '<i class="ph ' +
              s.icon +
              '" aria-hidden="true"></i>' +
              '<span>' +
              (isAr ? s.labelAr : s.label) +
              '<span class="suggestion-desc">' +
              (isAr ? s.descAr : s.desc) +
              '</span>' +
              '</span></a>';
          }
          container.innerHTML = html;
        }
      })();
    </script>
