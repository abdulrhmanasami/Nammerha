<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <!-- FRC-006 FIX: Pre-paint FOUC guard — hidden until theme-boot.js sets data-theme -->
  <style>html:not([data-theme]){visibility:hidden}</style>
  <script src="/theme-boot.js"></script>
  <link rel="icon" type="image/svg+xml" href="/brand/Nammerha_logo_icon.svg" />
  <link rel="apple-touch-icon" sizes="192x192" href="/brand/icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- CONF-P01 FIX: Enforceable CSP directives -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https:; font-src 'self'; object-src 'none'; base-uri 'self'" />
  <!-- P0-MOB-001 FIX: PWA installability -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#242424" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#F4F6F8" media="(prefers-color-scheme: light)">
  <title>Nammerha — Reset Password | إعادة تعيين كلمة المرور</title>
  <meta name="description" content="Reset your Nammerha account password securely." />
  <meta property="og:title" content="Reset Password — Nammerha" />
  <meta property="og:description" content="Reset your Nammerha account password securely." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://nammerha.com/brand/icon-512.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Reset Password — Nammerha" />
  <link rel="preload" href="/fonts/ibm-plex-sans-arabic.css" as="style" />
  <link rel="stylesheet" href="/fonts/phosphor/phosphor.css" />
  <script type="module" src="/src/pages/reset-password.ts"></script>
  <link href="/i18n.css?v=7" rel="stylesheet"/>
  <!-- PLAT-C03 FIX: theme-toggle.js added — was missing from this page.
       auth.html and verify-email.html include it. Without it, users arriving
       from a dark-mode session see jarring light-only page.
       Standard: Nielsen #4 (Consistency), Apple HIG (System Appearance). -->
</head>
<body class="bg-cloud-white font-display text-slate-900 antialiased">
<!-- PE-001 FIX: Noscript fallback -->
<noscript>
  <style>html:not([data-theme]){visibility:visible!important}</style>
  <div class="nm-noscript">
    <p class="nm-noscript-title">نعمّرها تحتاج JavaScript</p>
    <p class="nm-noscript-desc">Nammerha requires JavaScript. Please enable it in your browser settings.</p>
  </div>
</noscript>
<!-- P0-A1 FIX: Skip-to-content link (WCAG 2.4.1) -->
<a href="#main-content" class="skip-link" data-i18n="skip_to_content">Skip to content</a>
  <!-- P1-CRIT-002 FIX: Changed <div> to <main> — WCAG 2.4.1 landmark semantics.
       Previous: <div id="main-content"> — screen readers didn't announce main region.
       Standard: HTML5 §4.4.1, all other Nammerha pages use <main>. -->
  <main id="main-content" class="mobile-container flex flex-col relative min-h-screen">

    <!-- Brand Header -->
    <header class="px-6 pt-12 pb-6 text-center relative z-10">
      <div class="inline-flex items-center justify-center size-16 bg-trust-blue rounded-2xl shadow-lg shadow-trust-blue/20 mb-4">
        <i class="ph ph-lock-key text-white nm-icon-32"  aria-hidden="true"></i>
      </div>
      <h1 class="text-2xl font-bold tracking-tight" data-i18n="reset_password_title">Reset Password</h1>
      <p class="text-sm text-slate-500 mt-1" data-i18n="reset_password_subtitle">Create a new secure password for your account</p>
      <!-- PLAT-M05 FIX: Language switcher mount — was missing from this page.
           Auth page has it (C-AUD-006). International users were locked to Arabic.
           Standard: WCAG 3.1.2 (Language of Parts), Internationalization. -->
      <div id="nm-lang-mount" class="flex justify-center mt-3"></div>
    </header>
    <!-- PLAT-C03 FIX: Theme toggle button — parity with auth.html L90-92 -->
    <!-- CONF-2026-004 FIX: data-nm-theme-toggle + data-nm-theme-icon for engine auto-wiring -->
    <!-- DEF-THEME-001 FIX: Replaced inline `style="inset-block-start:...; inset-inline-end:..."` with CSS class.
         Standard: P1-001 CSS Single Source of Truth. -->
    <button id="nm-theme-toggle" data-nm-theme-toggle class="nm-theme-toggle-pos fixed z-50 w-9 h-9 rounded-full border border-slate-200 bg-white/90 backdrop-blur flex items-center justify-center cursor-pointer shadow-sm transition-all touch-safe" aria-label="Toggle theme" data-i18n-aria="aria_toggle_theme">
      <i id="nm-theme-toggle-icon" class="text-lg" data-nm-theme-icon aria-hidden="true"></i>
    </button>

    <!-- Status Banner -->
    <!-- P1-CRIT-005 FIX: Added role="alert" and aria-live="assertive" for screen reader
         announcements. Previous: no ARIA attributes — SR users missed error/success messages.
         Standard: WCAG 4.1.3 (Status Messages), parity with auth.html banner. -->
    <!-- DEF-VIS-002 FIX: Replaced style="display:none" with class="hidden".
         banner.ts now uses classList.add/remove('hidden') for show/hide.
         Standard: DEF-VIS-001 precedent, CSS Single Source of Truth. -->
    <div class="px-6 mb-4 relative z-10 hidden" id="reset-banner" role="alert" aria-live="assertive">
      <div class="rounded-xl p-3 text-sm font-medium flex items-center gap-2" id="reset-banner-inner">
        <i class="ph" id="reset-banner-icon" aria-hidden="true"></i>
        <span id="reset-banner-text"></span>
      </div>
    </div>

    <!-- Reset Form -->
    <form id="form-reset" class="px-6 flex flex-col gap-4 relative z-10" novalidate>
      <!-- New Password -->
      <div>
        <label for="new-password" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="new_password_label">New Password</label>
        <div class="relative">
          <i class="ph ph-lock absolute start-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <!-- DEF-RESET-001 FIX: enterkeyhint="next" — confirm password follows.
               Standard: Apple HIG (Keyboard Management), WCAG 2.1.1. -->
          <input id="new-password" name="new_password" type="password" required autocomplete="new-password" minlength="8" enterkeyhint="next"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 ps-12 pe-12 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="Min 8 chars, 1 uppercase, 1 number" data-i18n-placeholder="auth_pw_placeholder" />
          <button type="button" id="reset-toggle-pw" class="absolute end-3 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-slate-600" aria-label="Toggle password visibility" data-i18n-aria="aria_toggle_password">
            <i class="ph ph-eye text-xl"  aria-hidden="true"></i>
          </button>
        </div>
        <!-- Password Strength Meter -->
        <div class="mt-2 flex gap-1" id="pw-strength-bars">
          <div class="h-2 flex-1 rounded-full bg-slate-200"></div>
          <div class="h-2 flex-1 rounded-full bg-slate-200"></div>
          <div class="h-2 flex-1 rounded-full bg-slate-200"></div>
          <div class="h-2 flex-1 rounded-full bg-slate-200"></div>
        </div>
        <!-- INC-002 FIX: text-[11px] → text-[10px] — micro-hint tier (password guidance).
             Previous PLAT-P03 comment was wrong: auth.html uses text-[10px], not text-[11px].
             Standard: Design System Typography Scale Governance (INC-002). -->
        <p class="text-[10px] text-slate-400 mt-1" id="pw-strength-label" data-i18n="pw_requirements">8+ chars, 1 uppercase, 1 lowercase, 1 number, 1 symbol</p>
      </div>

      <!-- Confirm Password -->
      <div>
        <label for="confirm-password" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" data-i18n="confirm_password_label">Confirm Password</label>
        <div class="relative">
          <i class="ph ph-lock absolute start-4 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true"></i>
          <!-- DEF-RESET-001 FIX: Added enterkeyhint="done" (last field) + minlength="8" (parity with new-password).
               Standard: Apple HIG (Keyboard Management), Form Input Consistency. -->
          <input id="confirm-password" name="confirm_password" type="password" required autocomplete="new-password" minlength="8" enterkeyhint="done"
            class="w-full bg-white border border-slate-200 rounded-xl py-3.5 ps-12 pe-4 text-sm focus:ring-2 focus:ring-trust-blue/50 focus:border-trust-blue outline-none transition-all"
            placeholder="••••••••" data-i18n-placeholder="auth_confirm_pw_placeholder" />
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" id="reset-submit" class="btn-primary mt-2" disabled>
        <i class="ph ph-shield-check" aria-hidden="true"></i>
        <span id="reset-submit-text" data-i18n="reset_password_btn">Reset Password</span>
      </button>
    </form>

    <!-- Back to Login Link -->
    <div class="mt-6 px-6 text-center relative z-10">
      <a href="/auth.html" class="text-sm text-trust-blue font-medium hover:underline" data-i18n="back_to_login"><i class="ph ph-arrow-left" style="vertical-align:-1px;margin-inline-end:4px"></i>Back to Sign In</a>
    </div>

    <!-- PLAT-C04 FIX: Trust Footer — converted to progressive disclosure (matching auth.html FRC-N03).
         Previous: Trust badges shown inline — cognitive overload on a security-sensitive page.
         Standard: Nielsen #8 (Aesthetic and minimalist design), Design System Consistency. -->
    <div class="mt-auto px-6 py-8 text-center relative z-10">
      <details class="mb-3">
        <summary class="text-[10px] text-slate-400 font-bold uppercase tracking-wider cursor-pointer hover:text-trust-blue transition-colors inline-flex items-center gap-1">
          <i class="ph ph-shield-check text-xs"  aria-hidden="true"></i>
          <span data-i18n="auth_security_details">Security Details</span>
        </summary>
        <div class="flex items-center justify-center gap-4 mt-2 animate-fade-in-up">
          <div class="flex items-center gap-1 text-[10px] text-slate-400 font-medium">
            <i class="ph ph-shield-check text-smoky-jade text-sm"  aria-hidden="true"></i>
            <span data-i18n="auth_trust_1">OCDS Verified</span>
          </div>
          <div class="flex items-center gap-1 text-[10px] text-slate-400 font-medium">
            <i class="ph ph-lock text-trust-blue text-sm"  aria-hidden="true"></i>
            <span data-i18n="auth_trust_2">256-bit Encrypted</span>
          </div>
        </div>
      </details>
    </div>

  </main>

  <!-- P1-CRIT-003 FIX: Replaced inline physical positioning (right/left) with
       RTL-safe CSS classes. Previous: orbs appeared on wrong sides in RTL mode.
       Standard: CSS Logical Properties, Apple HIG (RTL Adaptation). -->
  <div class="gradient-orb gradient-orb-primary gradient-orb-pos-end" aria-hidden="true"></div>
  <div class="gradient-orb gradient-orb-jade gradient-orb-pos-start" aria-hidden="true"></div>
<!-- LEG-001 FIX: Legal footer — Terms, Privacy, Refund links (Platinum Standard) -->
<footer class="nm-legal-footer">
  <nav aria-label="Legal navigation">
    <a href="/terms.html" data-i18n="footer_terms">Terms</a>
    <a href="/privacy.html" data-i18n="footer_privacy">Privacy</a>
    <a href="/refund-policy.html" data-i18n="footer_refund">Refund Policy</a>
  </nav>
  <p class="nm-copyright" data-i18n="footer_copyright">© 2026 Nammerha. All rights reserved.</p>
</footer>

<script src="/i18n.js?v=7" defer></script>
<script src="/i18n/auth.js" defer></script>
<!-- P1-CRIT-004 FIX: Added load-guard.js and nav.js — were missing from this page. -->
<script src="/load-guard.js" defer></script>
<!-- PLAT-C03 FIX: theme-toggle.js — was missing, causing no theme switching on this page. -->
<script src="/theme-toggle.js?v=2" defer></script>
<script src="/nav.js?v=7" defer></script>
</body>
</html>
