# ═══════════════════════════════════════════════════════════════════════════════
# Nammerha Platform — Docker Compose (Production)
# Unified deployment: Frontend (Nginx) + Backend (Node.js) + Database (PG16+PostGIS) + MinIO (S3 Storage)
# Network isolation on nammerha-net bridge
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ── Database: PostgreSQL 16 + PostGIS ───────────────────────────────────
  nammerha-db:
    image: postgis/postgis:16-3.4-alpine
    container_name: nammerha-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nammerha
      POSTGRES_USER: nammerha
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=en_US.utf8'
    # ── TLS: Inter-container encryption (PCI DSS 4.1) ──────────────────────
    # The entrypoint copies certs from staging mount to runtime dir, fixes
    # ownership to postgres:postgres (UID 70 in Alpine), then starts PostgreSQL.
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /var/lib/postgresql/tls
        cp /tls-staging/server-full-chain.crt /var/lib/postgresql/tls/server.crt
        cp /tls-staging/server.key /var/lib/postgresql/tls/server.key
        cp /tls-staging/ca.crt     /var/lib/postgresql/tls/ca.crt
        chown postgres:postgres /var/lib/postgresql/tls/*
        chmod 600 /var/lib/postgresql/tls/server.key
        chmod 644 /var/lib/postgresql/tls/server.crt /var/lib/postgresql/tls/ca.crt
        exec docker-entrypoint.sh \
          postgres \
          -c ssl=on \
          -c ssl_cert_file=/var/lib/postgresql/tls/server.crt \
          -c ssl_key_file=/var/lib/postgresql/tls/server.key \
          -c ssl_ca_file=/var/lib/postgresql/tls/ca.crt
    volumes:
      - nammerha-pgdata:/var/lib/postgresql/data
      - ./database/tls/certs:/tls-staging:ro
    ports:
      - '127.0.0.1:5434:5432'
    networks:
      - nammerha-net
    labels:
      - 'com.nammerha.project=nammerha'
      - 'com.nammerha.component=database'
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nammerha -d nammerha']
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ── Distributed Lock & Cache: Redis 7 (Alpine) ──────────────────────────
  # INF-01: Required by redis.client.ts (Circuit Breaker Lock Manager).
  # Without this container, the RedisLockManager immediately opens the
  # circuit breaker and falls back to PostgreSQL Advisory Locks on EVERY
  # request — defeating the purpose of distributed locking entirely.
  # Also used for: rate limiter persistence, session cache, API response cache.
  nammerha-redis:
    image: redis:7-alpine
    container_name: nammerha-redis
    restart: unless-stopped
    # INF-01-FIX: REDIS_PASSWORD must be in BOTH command (for redis-server) AND
    # environment (for healthcheck). Docker Compose interpolates ${VAR} in `command:`
    # at parse-time, but does NOT inject host .env vars into the container's shell.
    # Without the explicit `environment:` entry, the healthcheck's $REDIS_PASSWORD
    # resolves to empty string → WRONGPASS → 850+ consecutive failures.
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --bind 0.0.0.0
      --protected-mode yes
    volumes:
      - nammerha-redis-data:/data
    ports:
      - '127.0.0.1:6379:6379'
    networks:
      - nammerha-net
    labels:
      - 'com.nammerha.project=nammerha'
      - 'com.nammerha.component=cache'
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: '0.25'
    healthcheck:
      # GAP-S3 PLATINUM FIX: Redis password no longer visible in `docker inspect`
      # or `ps aux`. REDISCLI_AUTH env var is the secure alternative to `-a` flag.
      test: ['CMD-SHELL', 'REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ── Object Storage: MinIO (S3-compatible, on-premise) ───────────────────
  # P2-005: Self-hosted file storage for spatial proofs, BOQ images,
  # floor plans, and all project-related uploads.
  # Speaks the S3 API — backend connects via @aws-sdk/client-s3.
  nammerha-minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: nammerha-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      MINIO_BROWSER_REDIRECT_URL: ''
    volumes:
      - nammerha-minio-data:/data
    ports:
      # API port (S3 protocol) — localhost only for security
      - '127.0.0.1:9010:9000'
      # Console port (web UI for management) — localhost only
      - '127.0.0.1:9011:9001'
    networks:
      - nammerha-net
    labels:
      - 'com.nammerha.project=nammerha'
      - 'com.nammerha.component=storage'
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    security_opt:
      - no-new-privileges:true

  # ── Frontend: Static Vite build served by Nginx ─────────────────────────
  nammerha-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    container_name: nammerha-frontend
    restart: unless-stopped
    ports:
      - '127.0.0.1:8082:8080'
    networks:
      - nammerha-net
    labels:
      - 'com.nammerha.project=nammerha'
      - 'com.nammerha.component=frontend'
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    read_only: true
    # FIX-008: Added healthcheck — wget for Alpine (curl unavailable).
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:8080/']
      interval: 30s
      timeout: 5s
      retries: 3
    tmpfs:
      - /var/cache/nginx:uid=1001,gid=1001
      - /var/log/nginx:uid=1001,gid=1001
      - /var/run:uid=1001,gid=1001
      - /tmp:uid=1001,gid=1001
    security_opt:
      - no-new-privileges:true

  # ── Backend: Node.js Express API ────────────────────────────────────────
  nammerha-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: nammerha-backend
    restart: unless-stopped
    ports:
      - '127.0.0.1:3010:3001'
    networks:
      - nammerha-net
    environment:
      - NODE_ENV=production
      - PORT=3001
      # ── Redis (INF-01: Distributed Lock + Cache) ──────────────────
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@nammerha-redis:6379
      - DATABASE_URL=postgresql://nammerha:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@nammerha-db:5432/nammerha?sslmode=verify-ca&sslrootcert=/app/tls/ca.crt
      - PGSSLROOTCERT=/app/tls/ca.crt
      - NODE_EXTRA_CA_CERTS=/app/tls/ca.crt
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - JWT_EXPIRY=${JWT_EXPIRY:-24h}
      # ── Payment Gateways ─────────────────────────────────────────
      # ✅ CONFIGURED & VERIFIED (2026-03-11)
      #   Visa Click to Pay — production API key + merchant ID set   ✅
      #   Fatora — production API key + merchant code set            ✅
      #   Webhook HMAC secret — cryptographic 64-char secret set     ✅
      #   All vars use :? syntax — container refuses to start without them.
      - PLATFORM_BASE_URL=${PLATFORM_BASE_URL:-https://nammerha.com}
      - VISA_API_KEY=${VISA_API_KEY:?VISA_API_KEY must be set for production payments}
      - VISA_MERCHANT_ID=${VISA_MERCHANT_ID:?VISA_MERCHANT_ID must be set}
      - VISA_API_BASE_URL=${VISA_API_BASE_URL:?VISA_API_BASE_URL must be set for production}
      - FATORA_API_KEY=${FATORA_API_KEY:?FATORA_API_KEY must be set for production payments}
      - FATORA_MERCHANT_CODE=${FATORA_MERCHANT_CODE:?FATORA_MERCHANT_CODE must be set}
      - FATORA_API_BASE_URL=${FATORA_API_BASE_URL:-https://api.fatora.io}
      - PAYMENT_WEBHOOK_SECRET=${PAYMENT_WEBHOOK_SECRET:?PAYMENT_WEBHOOK_SECRET must be set}
      - GPS_PROXIMITY_THRESHOLD_METERS=${GPS_PROXIMITY_THRESHOLD_METERS:-100}
      # ── Auth0 (CRT-004: RS256 JWT — required for production auth) ──
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:?AUTH0_DOMAIN must be set}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:?AUTH0_AUDIENCE must be set}
      # ── CORS (P1-003: No localhost in production) ──────────────────
      - CORS_ORIGINS=${CORS_ORIGINS:-https://nammerha.com,https://www.nammerha.com}
      # ── Georavity: Self-hosted Valhalla routing engine ─────────────
      - GEORAVITY_URL=${GEORAVITY_URL:-http://host.docker.internal:8002}
      # ── Storage (P2-005: MinIO on-premise S3 storage) ──────────────
      - STORAGE_PROVIDER=minio
      - STORAGE_BUCKET=${STORAGE_BUCKET:-nammerha-uploads}
      - STORAGE_REGION=us-east-1
      # MinIO runs HTTP on internal bridge (not publicly exposed)
      - STORAGE_ENDPOINT=http://nammerha-minio:9000
      - STORAGE_ACCESS_KEY=${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      - STORAGE_SECRET_KEY=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      - STORAGE_PUBLIC_URL=${STORAGE_PUBLIC_URL:-}
      - STORAGE_MAX_SIZE_MB=${STORAGE_MAX_SIZE_MB:-50}
      # ── Email Service (Resend SDK — API, NOT SMTP) ─────────────
      # The backend was migrated from Nodemailer/SMTP to the Resend SDK.
      # email.service.ts reads RESEND_API_KEY (not SMTP_HOST/USER/PASS).
      # Get your API key from https://resend.com/api-keys
      # Domain must be verified in Resend dashboard before emails send.
      - RESEND_API_KEY=${RESEND_API_KEY:?RESEND_API_KEY must be set for email delivery}
      - SMTP_FROM=${SMTP_FROM:-noreply@nammerha.com}
      # ── Email Verification / Password Reset ────────────────────
      - APP_BASE_URL=${PLATFORM_BASE_URL:-https://nammerha.com}
      # ── Quota Webhook Notifications (optional) ─────────────────
      - NOTIFICATION_WEBHOOK_URL=${NOTIFICATION_WEBHOOK_URL:-}
      # ── Social OAuth (Google, Apple, Facebook) ──────────────────
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_ID_IOS=${GOOGLE_CLIENT_ID_IOS:-}
      - GOOGLE_CLIENT_ID_ANDROID=${GOOGLE_CLIENT_ID_ANDROID:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID:-}
      - APPLE_BUNDLE_ID=${APPLE_BUNDLE_ID:-}
      - FACEBOOK_APP_ID=${FACEBOOK_APP_ID:-}
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET:-}
      # ── Testing Controls (NEVER enable in production) ────────────
      - SKIP_KYC_VERIFICATION=${SKIP_KYC_VERIFICATION:-}
    labels:
      - 'com.nammerha.project=nammerha'
      - 'com.nammerha.component=backend'
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    security_opt:
      - no-new-privileges:true
    depends_on:
      nammerha-db:
        condition: service_healthy
      nammerha-minio:
        condition: service_healthy
      nammerha-redis:
        condition: service_healthy
    volumes:
      - ./stitch:/app/stitch:ro
      - ./database/tls/certs/ca.crt:/app/tls/ca.crt:ro
    # P3-NEW-001 FIX: Lightweight healthcheck using wget (already in Alpine).
    # Previous approach spawned a full Node.js V8 process every 30s (2880/day).
    # wget --spider issues a HEAD request without downloading, saving ~20MB RAM/check.
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # PLT-AUD-011 FIX: Read-only filesystem prevents backdoor implantation.
    # tmpfs for /tmp allows Node.js to write temp files as needed.
    read_only: true
    tmpfs:
      - /tmp:size=32M

  # ── Tile Server: Self-Hosted Map Tiles (Sovereign Geospatial) ────────
  # FIX-2: Added missing tileserver-gl service — root cause of all /styles/,
  # /tiles/, /data/ 502 Bad Gateway errors. Nginx on Cloud forwards these paths
  # to 10.99.0.1:8088 (WireGuard tunnel to Metal). This service listens on
  # 127.0.0.1:8088 and serves the OpenMapTiles-compatible MBTiles file for Syria.
  #
  # ── Setup (first deploy only) ───────────────────────────────────────────
  # Place the Syria MBTiles file in the named volume before starting:
  #   docker run --rm -v nammerha-tiles:/tiles alpine sh -c \
  #     "wget -O /tiles/syria.mbtiles <MBTILES_URL>"
  # Then create /opt/nammerha-backend/tiles/config.json:
  #   {"data":{"syria":{"mbtiles":"/tiles/syria.mbtiles"}}}
  #
  # ── Style ───────────────────────────────────────────────────────────────
  # Uses the OpenMapTiles default styles (basic, dark) bundled in the image.
  # Future: mount custom Nammerha brand styles via /app/styles/ volume.
  nammerha-tileserver:
    image: maptiler/tileserver-gl:latest
    container_name: nammerha-tileserver
    restart: unless-stopped
    command: ["--config", "/tiles/config.json", "--port", "8080"]
    volumes:
      - nammerha-tiles:/tiles
    ports:
      - '127.0.0.1:8088:8080'
    networks:
      - nammerha-net
    labels:
      - 'com.nammerha.project=nammerha'
      - 'com.nammerha.component=tileserver'
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(\"http\").get(\"http://localhost:8080/health\",r=>{process.exit(r.statusCode===200?0:1)}).on(\"error\",()=>process.exit(1))"']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    security_opt:
      - no-new-privileges:true


volumes:
  nammerha-pgdata:
    name: nammerha-pgdata
  nammerha-minio-data:
    name: nammerha-minio-data
  # INF-01: Redis AOF persistence volume
  nammerha-redis-data:
    name: nammerha-redis-data
  # FIX-2: Syria MBTiles data volume for self-hosted tileserver-gl
  nammerha-tiles:
    name: nammerha-tiles

networks:
  nammerha-net:
    driver: bridge
    name: nammerha-net
