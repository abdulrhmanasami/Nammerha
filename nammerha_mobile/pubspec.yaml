name: nammerha_mobile
description: "نعمّرها — منصة إعادة إعمار سوريا الشفافة"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5

  # Navigation
  app_links: ^6.4.0  # P0-VE-001: Deep link handler (Android App Links + iOS Universal Links)

  # Storage & Security
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.3
  device_info_plus: ^12.0.0
  package_info_plus: ^9.0.0
  http: ^1.2.0
  web_socket_channel: ^3.0.1

  # Geospatial & Hardware
  camera: ^0.12.0
  geolocator: ^14.0.0
  flutter_foreground_task: ^9.0.0
  permission_handler: ^12.0.0

  # Map Rendering (flutter_map — MapLibre/OSM tile engine)
  flutter_map: ^8.0.0
  latlong2: ^0.9.1

  # UI Premium
  google_fonts: ^8.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16

  # External Links & Formatting
  url_launcher: ^6.3.0
  intl: ^0.20.2

  # Wave 1: Cart & Damage Report
  shared_preferences: ^2.3.0
  image_picker: ^1.1.2
  connectivity_plus: ^7.0.0

  # Push Notifications — Firebase Cloud Messaging (Platinum Standard)
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^21.0.0

  # GAP-M1 PLATINUM: Crash Reporting — captures fatal/non-fatal errors in production
  firebase_crashlytics: ^5.0.0

  # GAP-M2 PLATINUM: Performance Monitoring — app startup, HTTP, screen traces
  firebase_performance: ^0.11.0
  flutter_pdfview: ^1.4.4
  path_provider: ^2.1.5
  share_plus: ^12.0.2

  # Social OAuth — Native SDK Integration
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^7.0.1
  phosphor_flutter: ^2.1.0
  bloc_concurrency: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/brand/

# ═══════════════════════════════════════════════════════════════════════════
# App Icon Configuration — Nammerha Brand Identity
# ═══════════════════════════════════════════════════════════════════════════
# Brand Colors: Cobalt #0D47A1 → Deep Pine #0A6E55 (angular gradient)
# Run: dart run flutter_launcher_icons
# ═══════════════════════════════════════════════════════════════════════════
flutter_launcher_icons:
  # ─── Android ──────────────────────────────────────────────────────────
  android: true
  image_path: "assets/brand/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/brand/app_icon_android_foreground.png"
  min_sdk_android: 21

  # ─── iOS ──────────────────────────────────────────────────────────────
  ios: true
  image_path_ios: "assets/brand/app_icon_ios.png"
  remove_alpha_ios: true

  # ─── Web ──────────────────────────────────────────────────────────────
  web:
    generate: true
    image_path: "assets/brand/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#0D47A1"

# ═══════════════════════════════════════════════════════════════════════════
# Native Splash Screen — Nammerha Brand Identity
# ═══════════════════════════════════════════════════════════════════════════
# Shows instantly on cold start (before Flutter engine loads)
# Run: dart run flutter_native_splash:create
# ═══════════════════════════════════════════════════════════════════════════
flutter_native_splash:
  color: "#0D47A1"
  image: "assets/brand/app_icon.png"
  color_dark: "#242424"
  image_dark: "assets/brand/app_icon.png"

  android_12:
    color: "#0D47A1"
    icon_background_color: "#0D47A1"
    image: "assets/brand/app_icon_android_foreground.png"
    color_dark: "#242424"
    icon_background_color_dark: "#242424"
    image_dark: "assets/brand/app_icon_android_foreground.png"

  ios: true
  web: true
  fullscreen: true
