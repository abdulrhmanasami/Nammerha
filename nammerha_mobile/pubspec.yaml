name: nammerha_mobile
description: "نعمّرها — منصة إعادة إعمار سوريا الشفافة"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Navigation

  # Storage & Security
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.3
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  http: ^1.2.0
  web_socket_channel: ^3.0.1

  # Geospatial & Hardware
  camera: ^0.10.5+9
  geolocator: ^11.0.1
  flutter_foreground_task: ^6.1.1
  permission_handler: ^11.3.0

  # Map Rendering (flutter_map — MapLibre/OSM tile engine)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # UI Premium
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16

  # External Links & Formatting
  url_launcher: ^6.3.0
  intl: ^0.20.2

  # Wave 1: Cart & Damage Report
  shared_preferences: ^2.3.0
  image_picker: ^1.1.2
  connectivity_plus: ^6.0.3

  # Push Notifications — Firebase Cloud Messaging (Platinum Standard)
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1
  flutter_pdfview: ^1.4.4
  path_provider: ^2.1.5
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/brand/

# ═══════════════════════════════════════════════════════════════════════════
# App Icon Configuration — Nammerha Brand Identity
# ═══════════════════════════════════════════════════════════════════════════
# Brand Colors: Cobalt #0D47A1 → Deep Pine #0A6E55 (angular gradient)
# Run: dart run flutter_launcher_icons
# ═══════════════════════════════════════════════════════════════════════════
flutter_launcher_icons:
  # ─── Android ──────────────────────────────────────────────────────────
  android: true
  image_path: "assets/brand/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/brand/app_icon_android_foreground.png"
  min_sdk_android: 21

  # ─── iOS ──────────────────────────────────────────────────────────────
  ios: true
  image_path_ios: "assets/brand/app_icon_ios.png"
  remove_alpha_ios: true

  # ─── Web ──────────────────────────────────────────────────────────────
  web:
    generate: true
    image_path: "assets/brand/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#0D47A1"

# ═══════════════════════════════════════════════════════════════════════════
# Native Splash Screen — Nammerha Brand Identity
# ═══════════════════════════════════════════════════════════════════════════
# Shows instantly on cold start (before Flutter engine loads)
# Run: dart run flutter_native_splash:create
# ═══════════════════════════════════════════════════════════════════════════
flutter_native_splash:
  color: "#0D47A1"
  image: "assets/brand/app_icon.png"
  color_dark: "#242424"
  image_dark: "assets/brand/app_icon.png"

  android_12:
    color: "#0D47A1"
    icon_background_color: "#0D47A1"
    image: "assets/brand/app_icon_android_foreground.png"
    color_dark: "#242424"
    icon_background_color_dark: "#242424"
    image_dark: "assets/brand/app_icon_android_foreground.png"

  ios: true
  web: true
  fullscreen: true
