<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- SEO Protection: Private Admin Dashboard -->
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Nammerha Spatial Desktop Admin Dashboard">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Nammerha Dashboard">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- WebGL MapLibre Platinum Implementation dependencies -->
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  
  <title>Nammerha Dashboard</title>
  <link rel="manifest" href="manifest.json">

  <!-- Zero-FOUC Preloader Styles -->
  <style>
    body {
      background-color: #0F172A; /* Deep Indigo */
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .loader {
      border: 4px solid rgba(255, 255, 255, 0.1);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border-left-color: #38BDF8; /* Sky Blue accent */
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loader-container" class="loader"></div>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}
    _flutter.buildConfig.builds[0].compileTarget = 'wasm';
    
    // The flutter_bootstrap.js initializes the flutter engine
    _flutter.loader.load({
      onEntrypointLoaded: async function(engineInitializer) {
        const appRunner = await engineInitializer.initializeEngine();
        document.getElementById('loader-container').remove();
        await appRunner.runApp();
      }
    });
  </script>
</body>
</html>
