<!doctype html>
<html>
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <!-- SEO Protection: Private Admin Dashboard -->
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Nammerha Spatial Desktop Admin Dashboard" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Nammerha Dashboard" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- WebGL MapLibre Platinum Implementation dependencies (Self-Hosted) -->
    <script src="maplibre-gl.js"></script>
    <link href="maplibre-gl.css" rel="stylesheet" />

    <title>Nammerha Dashboard</title>
    <link rel="manifest" href="manifest.json" />

    <!-- Zero-FOUC Preloader Styles -->
    <style>
      body {
        background-color: #0d47a1; /* Trust Blue */
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #242424; /* Tech Dark */
        }
      }
      .loader {
        border: 4px solid rgba(255, 255, 255, 0.1);
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border-inline-start-color: #1558d6; /* Trust Blue accent */
        animation: spin 1s linear infinite;
      }
      @media (prefers-color-scheme: dark) {
        .loader {
          border-inline-start-color: #5c9ce6; /* Cobalt Light accent */
        }
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
    <style id="splash-screen-style">
      html {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100%;
        background-color: #0d47a1;
        background-size: 100% 100%;
      }

      .center {
        margin: 0;
        position: absolute;
        top: 50%;
        inset-inline-start: 50%;
        -ms-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
      }

      .contain {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .stretch {
        display: block;
        width: 100%;
        height: 100%;
      }

      .cover {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .bottom {
        position: absolute;
        bottom: 0;
        inset-inline-start: 50%;
        -ms-transform: translate(-50%, 0);
        transform: translate(-50%, 0);
      }

      .bottomStart {
        position: absolute;
        bottom: 0;
        inset-inline-start: 0;
      }

      .bottomEnd {
        position: absolute;
        bottom: 0;
        inset-inline-end: 0;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: #242424;
        }
      }
    </style>
    <script id="splash-screen-script">
      function removeSplashFromWeb() {
        document.getElementById('splash')?.remove();
        document.getElementById('splash-branding')?.remove();
        document.body.style.background = 'transparent';
      }
    </script>
    <meta
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
      name="viewport"
    />
  </head>
  <body>
    <picture id="splash">
      <source
        srcset="
          splash/img/light-1x.png 1x,
          splash/img/light-2x.png 2x,
          splash/img/light-3x.png 3x,
          splash/img/light-4x.png 4x
        "
        media="(prefers-color-scheme: light)"
      />
      <source
        srcset="
          splash/img/dark-1x.png 1x,
          splash/img/dark-2x.png 2x,
          splash/img/dark-3x.png 3x,
          splash/img/dark-4x.png 4x
        "
        media="(prefers-color-scheme: dark)"
      />
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="" />
    </picture>
    <div id="loader-container" class="loader"></div>
    <script>
      {
        {
          flutter_js;
        }
      }
      {
        {
          flutter_build_config;
        }
      }
      _flutter.buildConfig.builds[0].compileTarget = 'wasm';

      // The flutter_bootstrap.js initializes the flutter engine
      _flutter.loader.load({
        onEntrypointLoaded: async function (engineInitializer) {
          const appRunner = await engineInitializer.initializeEngine();
          document.getElementById('loader-container').remove();
          await appRunner.runApp();
        },
      });
    </script>
  </body>
</html>
